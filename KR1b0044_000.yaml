body:
  text: 洪範明義書類提要臣等謹案洪範明義四卷明黃道周撰道周有三易洞璣别著録是編乃崇禎十年官左諭德掌司經局時纂集進呈之書其自序曰上卷言天人感召性命相符及好德用人之方下卷言陰隲相協彞倫條貫旁及陰陽厯數之務初終兩卷乃正定篇章分别倫序道周之學深于天文律吕其以水火金木土之汨敘類集厯代災異意存鑒戒不免沿襲伏生董仲舒劉向相傳之説至于八政疇序以食配坤以貨配巽以祀配離以司空配兑以司徒配艮以司寇配坎以賔配震以師配乾已屬牽合又配以六十四卦先後天圖更屬傅會其最異者至以河圖洛書配厯數而曰自某年至某年為稼穡初際中際末際以至從革曲直潤下炎上莫不有初際中際末際其説更不可究詰至于改農用為晨用衍忒為衍一六極為六殛更屬臆説其章段次第自蘇軾洪邁張九成葉夢得王柏吳澄金履祥胡一中歸有光皆疑其舛錯各為更定道周兼採衆説參以已見亦未見其必然惟其論天人相應之理意存鑒戒較王安石之解洪範以天變為無與于人事者固為勝之讀者取其立言之大旨可也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀洪範明義原序臣觀五帝三皇之道備在易象自易象而外惟有洪範一書為堯舜所授於禹湯周公所得於箕子者易於明夷之卦推崇箕子明羲文之道在箕子非他作者之所敢望也漢興伏鼂口授不真厥後諸儒皆因伏鼂以證古簡是以訛舛相沿失其倫脊五十九篇之中時有依託先後間出然皆史家述記之言雖巔末稍殊無傷大義如武成洛誥先儒之所正定後人不以為非獨洪範一書以理義古奧條貫錯綜沿二千年未之有改使禹箕之結撰與史記同觀神聖之微言為耄口所亂良可惜也臣考篇中有錯簡者三訛字者三錯簡如五紀三德敷言錯而在後威福建極敷言錯而在前訛字如晨為農一為忒殛為極之類皆伏鼂之所不稽鄭孔所未説宋元諸儒稍發其端明興諸賢未竟厥緒臣下愚迂昧繹思此義近二十年幸逢聖主留神經籍奉旨纂輯乃復不揣為明義四卷其上卷皆言天人感召性命相符及好德用人之方下卷皆言隂隲相協彛倫條貫旁及隂陽厯數之務初終兩卷乃正定篇章分别倫序以及聖神授受之統凡八萬七千六百餘言臣下愚迂昧私意以為古今典籍自易象春秋而外所可敦崇紬繹未有過於斯書者也黃道周序欽定四庫全書洪範明義卷首明黃道周撰洪範洪大範法也言天地之大道百世所取法也書序云武王勝殷殺受立武庚以箕子歸作洪範孔安國以是書箕子所作蓋自夏商而下聖賢之筆僅有存者獨是篇耳神禹既歾至道難聞湯伊所傳極於人事是篇統括天人綱紀萬象信易學之閫奧聖道之要領也後世聖人有志於堯舜之道傳神禹之學者必在是篇焉篇中有錯簡三四處讀者相沿迷其條貫今先為甄别釐正而後明釋其義皆仰藉聖謨逺資祖訓庶可質諸無疑俟而不惑焉原本古文上卷皆依原文惟十有三祀王訪于箕子王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彛倫攸敘箕子乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極農疑作晨極疑作殛一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穯潤下作鹹炎上作苦曲直作酸從革作辛稼穯作甘二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師四五紀一曰歲二曰月三曰日四曰星辰五曰厯數宋臣蘇軾云此下有曰王省惟歲至則以風雨八十七字自洪邁張九成葉夢得皆云然當從之為正五皇極皇建其有極蘭溪金履祥云此下有皇極之敷言自無偏無陂至以為天下王一百字理亦當然其斂時五福至作汝用咎三段一百四十六字宜在末章五福六殛之下斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐煢獨而畏高明人之有能有為使羞其行而邦其昌凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎臣按此三段一百四十六字皆言好德錫福之事為箕子既敘九疇又申錫其義以明皇極為九用之宗壁書漆簡誦習既稀間有斷落遂取諸有錫極字類者皆繫于建極之下不知其為申明福殛之説諦繹先後其條貫自明也無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極臣按此皇極敷言猶周公致戒孺子其朋之意即繫皇建有極之下與金履祥説合無疑也曰皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王臣按此兩段一百字皆皇極之敷言箕子既述敷言又中其説猶五紀之下有曰王省惟歲至則以風雨八十七字也凡厥庶民下有皇字六三德一曰正直二曰剛克三曰柔克平康正直強弗友剛克燮友柔克沈潛剛克高明柔克臣按此一段三十六字皆本王道以成三德與下文威福之義無涉惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒臣按此一條四十八字即在斂福錫極三段之後蓋合福殛嚮威而言之以明兩用之歸於皇極以終九疇之義也七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒衍一猶大衍之挂一也因上文有忒字遂誤作忒字相近也立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶八庶徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若曰王省惟歲卿士惟月師尹惟日歲月日時無易百穀用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨臣按此一段八十七字為五紀演疇如蘇軾之説也宜在第四疇五紀之下九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極極當作殛一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱臣繹二條文義未終古人立言各有綱紀次第其斂時五福用敷錫厥庶民三段一百四十六字宜在此下無疑也又惟辟作福四十八字皆嚮威之義與剛克無涉亦與是相聨則文義燦然條貫備舉矣或疑無偏無陂兩段與是嚮威義亦相聨當為此篇一大綰束則文意悠揚前後無憾然古人文字不作修倩只要綱紀分明自四五紀而下各有衍疇則皇建其有極而下亦須分疏但不得以保極作極會極歸極之類滙於一處耳今定中條為皇極之敷言凡演一百字自五福六極而下有斂時五福三段一百四十六字結以惟辟作福一段四十八字體嚴義足無所復疑凡洪範一篇一千二百九十五字無有闕漏但段落錯置耳今定為經文如左正定今文下卷皆依今文惟十有三祀王訪于箕子王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彛倫攸敘箕子乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極農用之農疑作晨六極之極當作殛一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穯潤下作鹹炎上作苦曲直作酸從革作辛稼穯作甘二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司冦七曰賓八曰師四五紀一曰歲二曰月三曰日四曰星辰五曰厯數此下依蘇軾曰王省惟歲至則以風雨八十七字曰王省惟歲卿士惟月師尹惟日歲月日時無易百穀用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨五皇極皇建其有極此下依金履祥無偏無陂一百字無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極臣按此五十六字為皇極敷言下段四十四字宜為終篇之末簡曰皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王臣按此四十四字宜在威福篇末詳定於後六三德一曰正直二曰剛克三曰柔克平康正直強弗友剛克燮友柔克沈潛剛克高明柔克舊本惟辟作福四十八字今移在五福六殛之後七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶八庶徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐煢獨而畏高明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎三段一百四十六字言斂福好德以終建極之義與威福相聨惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒臣按全篇文義曰皇極之敷言一段四十四字移足於此則條貫完好先儒未開此義姑以敷言兩段相承世逺文湮無徵弗信尚俟聖明獨斷定其式序以貽來人也洪範明義卷首
