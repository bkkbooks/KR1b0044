獨裁非迂儒所敢與也臣繹經典精奥之言無踰洪範又繹洪範精奥之義無逾一為五行九為嚮威者此篇雖言一九互藏五運六氣繋於南方猶非其至也夫子一生沉研洪範凡詩春秋絀伸進退皆從此出所為歳月日辰閏食休咎民生所繫隂騭相協盡在於此非虚存五六之文汎除十五之義也攷春秋經行毎嵗絀九二百四十三嵗當絀半嵗之辰倍而引之四百八十六嵗當絀一嵗之辰故春秋再合與河圖同運每四百八十六嵗得四百八十五嵗之實所以然者天行六十年不及範數二千七百四十半以八積之為五年之辰小餘一九故春秋行四百八十五年而與天洪範共㑹於二萬一千九百二十四之端是春秋所以兩倍追天與範之實也詩經行毎嵗絀九三百單五嵗當絀二千七百四十五以八積之為五年之辰小餘四十五故詩行二千四百三十五嵗而與天洪範共㑹於二萬一千九百六十之端是詩所以五倍追天與範之實也詩與春秋異行而皆以範為體以天為用進退九五以集命疇之端故九者詩春秋所為度也五者詩春秋所為盈也六者詩春秋所為虚也盈虚五六嚮威以生皆集於九以分十一閏以此閠食以此食故一嵗盈虚十日九虚能者叙之以福不能者汨之以旤一月之辰三百五十有四餘三一嵗之日三百五十有四餘三統餘十一以定威福故詩有舍範而從易春秋冇舍易有從範詩之從易春秋之從範兩者仲尼之所獨取也易之絀十四範之絀九絀十四者從五五其六十而復加五絀九者從六六其八十而復加六焉五六者天地所為威福也天地以是行其􅫚福聖人以是敕其善敗故日二十餘五而戒盈三十餘九而戒虚辰三百十二而戒盈四百六十八而戒虚兩者天地之大限也兩戒相乗百二十六而嚮威參半故天子有所不能夀於民諸侯有所不能富於民天子有所不能凶折於民諸侯冇所不能憂疾於民得其道者可以歛福錫極於天下不得其道者以憂疾惡弱攖其身與它曰仁也義也禮也智也根心生色如此而已然則庶民之生皆有福殛命與性與道與教與曰以天治之則皆命也道也以君治之則皆性也教也然則凶短康寧可以相矯夀富惡疾可以互借與曰是已言之八政之事也八政四克剛柔相濟值其所不齊而後委之於命然則聖人亦言命與何為其不言命也易八百三十六以五乘之而以為詩有性有情有功有德夀富康寧好德考終五福者皆出焉春秋七百二十九以六乘之而以為春秋有伐有侵有弑有滅凶短折疾憂貧惡弱六殛者皆出焉兩者性命道教之所繇總也然則詩皆言福春秋皆言殛者與曰何為其然也其求之之法理窮性盡則至於此也然則詩以五乘八百三十六復益五焉尚餘一百三十一春秋以六乘七百二十九無餘矣然則詩有餘福春秋無餘殛與曰何為其然也洪範餘天毎嵗四十五以九退之尚餘三十六詩餘天一百三十一以十約之不及十一不及十一不謂之弱過四十五不謂之强福者本也殛者末也取福太盡則餘殛隨之矣然則是皆治其末者與曰其治之皆有兩限焉詩之限五一也限十四二也限五者毎限八百五十限十四者毎限三百有五是皆無閏之嵗星月主之春秋之限九一也限六二也限九者毎限四百八十六限六者毎限七百二十九是皆有閏之嵗嵗日主之詩之主月春秋之主日福殛嚮威互相治也然則春秋十積詩八積二千四百三十而贏絀五嵗可也曰疇主進春秋主卻進郤之間詩裁其間詩日以贏春秋日絀故殛之數不侈於福也不知詩與春秋贏絀之數者則不知天所隂隲下民歛福錫極始終之義矣然則範疇之進四十强五詩易之退一十弱四範疇詩易進退合􅐔不及六十左右分行而春秋以九乘除其間九得十一為九十九以九十九分治福極而又曰進郤之間詩裁其間何也曰春秋與範疇同體者也詩易同用者也春秋與範疇皆用九故以詩易為之權衡詩易皆用十四弱故以春秋範疇為首尾權衡猶之月交首尾猶之交壤月交猶之炁孛交壤猶之羅計四者皆相為用而交壤無為月交有象故使範疇春秋自為進郤而以詩易裁之然則範日以贏春秋日以絀詩易無所贏絀而又變辭以治之何也曰辭不盡意言不盡象得其通數而後其正數可治也洪範歛福錫極圖凡論去極皆以土中為準土中北極出地三十六度則北極而南五十五度至於天中此五十五度者五行之府神明所棲列宿皆陳於前七緯與之出入所謂福圖也黄赤道上下各二十四度合為四十八蓍法之所從生自天中至南地平九十一度半除黄赤道四十七半下餘四十五弱故北陸而上五十五強至扵北極以為河圖南陸而下四十五弱至於地平以為雒書日月之行經於其中六九而北五九而南凡十一九以分南北而威福出焉聖人用福而去威威主用威而去福威福之端各去其一以立皇極故皇極者威福之凖也詩春秋合用嚮威圖二凡詩五限四千二百五十尚縮一百三十二半為整十一日於十二朔中虚一閏日春秋九限四千三百七十四尚餘一百二十四辰以九辰益之於十二朔中亦贏一閏日故以九為端以十一為候散於諸限之中嚮福威殛之所從出也五行之行各有餘沴出而與肅乂哲謀聖值則咎反為休出而與狂僣豫急蒙值則天禍人刑交中之矣詩以性情扶命春秋以禮樂扶法其於稽疑騐徵不假占卜以知天道則仲尼之所獨至也凡詩十四限之數即十二朔之月與五限八百五十相通即易六十一嵗之縮餘也易六十嵗縮分八百三十六加一歲為八百五十故五其六十一而易與朔㑹易與朔㑹則詩與易㑹詩易合朔而鬼神日月從此更始矣春秋六限之數即十二月之氣與九限八十六相通亦八十一歲之縮餘也疇八十歲縮分七百二十加一歲為七百二十九故六其八十一而疇與嵗㑹疇與歳㑹則易詩春秋皆與歲㑹疇易詩春秋皆與歲㑹而鬼神日月從此更始矣故詩易職月也春秋疇職嵗也歲月成而人事察人事察而天道可别南陔白華華黍繇庚崇丘繇儀此六者聖人有所不用也聖人而用此六者則氣朔盈虚無以為别聖人而不存此六者則後之測閏食者無以為日獲麟之後是有辛酉聖人而存辛酉則四百八十歲之後不盈六載聖人而去辛酉則一元之數僅得四百八十有四故道有所并用法有所兼寄月不專福日不專威隂隂陽陽正間相追易不專朔範不專氣或向或背威福乃大故知天易詩春秋四序追疇之故者可以知㑹極歸極之義矣凡疇本數至多天次之春秋次之易與詩又次之疇毎嵗四千四百二十八六分七釐五毫天之比疇減四十五辰六分七釐五毫春秋之比疇减五十四辰六分七釐五毫易之比疇减五十九六分四釐八毫三絲詩之比疇減七十四六分七釐五毫凡天春秋易詩之數皆不及疇故立四序以追之天之追範九十六年而少周四百八十年而大周春秋之追範八十一年而少周四百八十六年而大周易之追範七十三年而少周三百六十五年而大周詩之追範五十八年而少周二百九十年而大周凡大周之限皆盡於二千四百三十以八乘詩限而退九十六月之朔實以十乘春秋限而進二十五嵗之氣分以為未齊而極於四千三百九十八嵗則全範之福威皆盡矣故福者所以為休也威者所以為咎也福威嵗分一百三十一約十一微弱以是微弱數往而得其餘分以是微弱數來而得其末路故十一微弱天地之所鞏後也五精之徤給物而少靳福有所不縱威有所不騁故弱者威福之餘沴也天地以是十一寄其皇柄使世之作辟者仰受威福而皆有憚心威福罄竭則萬物殄絶以是皇柄測其餘沴乘其本數而要其末路則萬物之錫極亦皆有命之矣天地之心微神明之㫖細二十六萬二千一百四十四去其十三一分而集於闓陽之端七精還元五百二十四去其十三一分而聖期底定聖人以其不獲已拜福於天地以其不獲已命威於百姓圓方二圖易詩春秋所為威福之本也聖人而無是三本者則八政無所麗九用無所措聖人亦不知所為錫極保極之事故範者天地所以立法也詩者聖人所以致思也立法積祥致思積微賢者見端明者審幾察是三千以十一御之故休咎不以撓聖人威福不以撓天地範疇天度春秋詩易積微圖凡詩與易同度無易則詩無所據􅐔數雖殊而限分一也易一周六十嵗詩一周六十日以易之嵗當詩之日以詩之日去易之嵗故五周而存皇極之中六周而去河圖之體益以大衍而為嵗朔之分益以圓圖而為天行之序也三本雖以追天而實追範天之追範不及四十五春秋追範不及五十四易之追範不及六十至於六十而日月干支可合矣詩易體分四千二百五十一有六以百三十一㑹之而閏朔始并以三十三乘之而得四千三百二十三不及六十此詩易􅐔範之㣲端也凡二千一周而得二十六萬二千一百三十一故一百三十一者皇極嚮威以為端始益十三㣲强而與範㑹萬物福殛從此禀受性者以為性命者以為命道者以為道教者以為教危㣲精一去其十三而集於㣲端是維皇之極而聖人之所命獨也故君子之學不患不大於天地而患不細於絲髪以絲髪之大而猶不足以比細故凶短折疾憂貧惡弱乘於氣質挾於五行以申賢者雖賢者有不能免也然則為之如何曰好徳而已好徳則不貧好德則不憂好德則不惡不惡則不疾不疾則不凶短折司冦五極吾知免也然則弱之為患有值之者乎曰弱者五精之至靳亦其好徳有所不足也然則五精贏絀皆出於閏與曰嵗月日辰已禀之也五紀之精以為五物五物之游以為五閏五閏五變值其不及則天地亦不能益之矣然且聖人能益之曰遷善改過是也顔子善學夀於天地展禽多識富於齊景然則五紀命物生數常少成數常多隂數常贏陽數常乏以陽值生數不過八為之如何曰五行生成亦各互取三鍾之行上有生木三吕之行上有生金故亥非一水已非二火以癸從亥原非二水以丁從已原非四火入限淺深而乗數贏縮兆魄變異故辰星之變枉矢破女拂樞滅寶繞蜒驚祀熒惑之變天隂晉若官張赫崔昭明蚩旗嵗星之變棓槍猾衝國蝗及登太白之變杵柎伏靈狗殘卒起鎮星之變五殘獄漢大賁絀流旬始擊咎此三十星者各乘其餘沴以汨彝倫惟聖人能以四克扶其正直正直四克皇極乃立皇極既立乃命威福柔者以剛弱者以强雖龍蛇之孽不為憂也嚮威限圖凡是閏分一百三十一為天地嚮威之本分於九宫毎宫四百八十六而退一度各得十四辰五分五釐五毫於九宫中分為三十三限得四千三百二十三外虛六十為嵗月日星辰厯數贏縮進退之路凡入閏不及十四命物過於六十入限過於八十皆為極備極無天地補救之所不逮故徳行數度君子之所共議也君子食不爽其度貨不爽其度祀不爽其度工不爽其度用衆用刑不爽其度用兵用師不爽其度然則聖人之使五行治食福威治師宗伯治八政司冦治稽疑五事治貨庶徴治賓五紀治工三徳治徒何也曰是固所以治之也人食於五行五行不求報於人人寶其五事五事不與人為市神明其政則政不淫蓍龜其刑則刑不濫司空治厯則辨制司徒選徳則盡義休咎以觀賔則内慝不作威福以觀師則主柄不落人而神之地而天之散而精之衍而專之故九疇分布而八政不失也然則威福之用獨為師用也而上貫五行中總皇極以為是天地帝王所神明其事者何也曰師者一政之治疇者八政之治也政有所不治疇無所不治賔師從疑則蓍龜與稽威福從辟則五行為吏夫是則天地與帝王共治也然則五福六殛之於五行庶徵亦有繫屬與曰聖人之言也不離其類順者為福逆者為殛以類求之十不失一又為休咎福極圖終焉恒雨之貌為土沴水恒𤾉之言為水沴火恒燠之眎為金沴木恒寒之聽為火沴金土之沴水厥貎贏弱水之沴火多疾多憂金之沴木是凶短折火之沴金是醜喪貝贏弱之人是無肅貌疾憂之人是無乂言凶短折者必無哲視醜寒之人亦無謀聽并是而觀星辰川嶽所命五物所播五體動静吉凶舉可知也然則康寧不屬土惡弱不并沴貌與曰惟好徳則思永康寧則聴聰好徳和風康寧袪寒是其别也然則凶短折之不屬貎弱之不屬極何也曰是先儒之疑義也五徳不入邊際六殛不入皇極人壽不夀沴見於目人富不富沴發於聲人安不安沴見於聴好徳好色考祥凶終沴見於貎然則西南皆兼兩殛好徳亦通考終四體之咎動分八極與曰猶之嚮威也九居一方而福殛兼用水獨弱流與風俱竭金耗而惡木凶而折火疾與憂亦傷於思故思御水火而體冇八殛然則六殛之疴視獨過備何也曰視者精神之領部也疾憂貧惡弱五沴之徴皆標於視然則好徳之人不入六殛脩短考終亦冇傷燠何也曰木者仁也水者智也智曰考祥智曰考終易曰冇子考無咎聖人之於生死壽夭休咎福殛則必冇以處之也然則是為考終而發與曰範詩春秋皆為考終而發也範往而進詩來而退春秋以九除於其間雖百三十一而詩之從易春秋之從範皆藏於十四顯於四十五六分之間以九九權之以命名物天地之精㳺不専為閏也然則五行之數不復孤行與曰五行之數存於九部而見端於其末惻隱羞惡辭讓是非五徳之見端也見端者知性見性者知命然則聖人之屬比為此者何與曰命體致用聖人之本事也窮神知化則不可知夫以考德居業觀政明治交察天人之故以和順於理義則舎此莫以矣然則隂隲相協是皆人事與曰是天道也則亦地道也天别隂陽地察剛柔五十之中君子以居夫使水不沴火火不沴金金不沴木集五德以免六殛之患非神禹能如此乎洪範明義卷下之終
