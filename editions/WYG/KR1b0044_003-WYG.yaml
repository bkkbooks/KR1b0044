俊民而徒云與民同其好惡又不念庶民而實欲自行其好惡則平康正直之誼裒而嚮福威殛之權皆倒矣上章言日月之行有冬有夏月之從星則以風雨猶言風雨生于日月不生于星辰寒暑生于冬夏不生于風雨明天子當與俊民共治庶民不當與近臣共為好惡也下章言平康正直明是無有偏黨無作好惡而剛柔四克其權出于皇極天子所為道義與庶民所為道路一也三代而下天子已尊俊民已䛕語皇極則云天子所以正庶民之偏黨語三徳則云天子所以克臣下之偏私終日求之臣民而天子無事焉所以五紀失序而咎徴日見也今以皇極不用敷詞八用總歸一建復舉五作九用分屬圖書以發明皇極繫於左焉作聖建用圖思睿作聖即皇極也而又不指為皇極者蓋作聖為天子之體而建極為天子之用語體則肅又哲謀皆作聖之體語用則敬晨協乂明念嚮威皆建極之用也五行初不言用蓋以五行為本嚮之則福背之則威離有嚮極之福坎有背極之威然體天為用者初無威福以威福託于天而敬建歸于己則皇極之建亦可不言五行不言威福也人主不以威福為用而以睿聖為體晨八政而明稽疑乂三徳而協五紀敬五事而念庶徴雖不作威福威福已著于天下矣上章言庶民惟星星冇好風星有好雨必使庶民皆無好惡王者不能必使王者皆從民之好惡天地亦不能也天地日月無私好惡王者法之以建天地而行日月使八政稽疑五事庶徴三徳五紀相為參贊不撓嚮威之明不汨五行之序而已詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅一敬而後喜怒哀樂各中其節中節而後位育致也然則所稱遵王者何也曰王一天也天子作民父母以為天下王不為民父母則無以作天子天子亦天也惟王稱天天子之法天猶後王之法前王孟子曰遵先王之法而過者未之有也以中和法天以道義法先王然後可稱建極矣又作中和圖如左喜怒哀樂是生好惡蕩平正直即為中和蕩平可以稱道正直可以稱義道義立而中和致中和致而皇極可建也皇極無倚一敬本獨故曰慎獨再作慎獨圖如左九兼兩用而五行不言用五行寄諸用者也五不言五行而一言五行五行貫于獨者也皇極宜言獨而不言獨五行宜言五而不言五故以獨寓于五以五寓于獨獨之寓于五五之寓于獨猶一用之為兩用一九之為十一也故方圖之南北與中央出入天地之要妙也夫使五為五行一為皇極則人將執五以求五行執一以求皇極使執五可得五行執一可得皇極則是用嚮之半可得半威用威之半可得半嚮也折四不可以當五折五不可以當六故以五福還于南嚮以六殛還于北威五福還于南嚮而五非南嚮六殛還于北威而一非北威故分五以為九用留一以為獨建一建于五之中五建于一之内人知夫一之街于九五之逵于九而不知夫一之無所不宅也一無所不宅而復還于五歸于一故以五居一謂之皇以獨命五謂之極敬晨協乂明念嚮威皆慎也慎則無所不敬敬而不晨不協不乂不明不念則猶若有所未慎也有所未慎則八政稽疑五紀庶徴猶在眎聽聞暏之内一慎祗敬則七十五占五休五咎皆不在眎聽聞睹之内眎聽聞睹不在形聲而後喜怒哀樂與天地同體與天地同體而後與天地同用矣然則嚮威福殛何所用之曰嚮威福殛天地之大用也聖人不用則還諸天地還諸天地而五行可吏也衆人欲用天地而卒不勝天地以其好惡争勝五行而卒為五行所勝者比比也三徳章第八六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克高明柔克臣攷三徳之正五紀猶中氣之和嵗㑹嵗有太過名曰先天嵗有不及名曰後天五陽先天氣交于大寒之前五陰後天氣交于大寒之後故為中氣以和之五運六氣互相克制中和始得故曰天子建申和之極言天子以八政剛柔正陰陽之治也剛柔寄于八政陰陽辨于五紀嵗月不殊而人民異動故為四克以平之平而後正正而後乂乂而後明故為稼穡以乂平康為從革以乂弗友為曲直以乂燮友為炎上以乂沈潜為潤下以乂高明斧鉞弓旌鞀鐸琴瑟蓋合為正直之用也孔安國曰地雖至柔亦有剛克能出金石天為剛徳亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣蘇軾深取是說然猶迂濶逺于情實其情實者亦曰克己復禮而已己者人也禮者天也彊弗友燮友沈潜髙明皆人也剛克柔克天也天即禮也蓋有禮則正直正直則四克有所措不然亦猶之鹽梅麯蘖歸于調停而已乾以弗友而用離離以烈而成其光坤以燮友而用坎坎以順而成其利坎以沈潛而用震震奮而知省離以高明而用兑兑悦而趨事西方之用巽東方之用兑君子亦各有取之也堂皇之間縣象布和正直不克取諸稼穡邊圉之間正辭伐罪以剛克彊取諸從革親黨之間恵懋保和以柔克燮取諸曲直閫閥之内有物有恒以剛克柔取諸炎上臣隣之間有浹有巽以柔克剛取諸潤下周官柞氏掌攻革木及林麓夏日至令刋陽木而火之冬日至令剥陰木而水之若欲其化也則春秋變其水火薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之其刋陽木而火剥陰木而水此猶之弗友剛克燮友柔克也其春秋變水火及以水火變之此則所謂沈潜剛克高明柔克也凡己私之難克猶草木之有根芽非水火互用不能殄絶聖人以正直為心剛柔為用先正己而後正人先直己而後直人知柔知剛以變化成其順治其所以成治者皆八政之用而克復歸仁在八政之先非主敬君子未之能省也此視聽言動四勿之功獨傳顔氏子乎凡八政之官分治四克而平康正直獨以物格歸于皇極沈潜主貌貌之恭肅為克取剛貌無剛克則玩䙝乗之與物俱波詩曰洵有情兮而無望兮高明主言言之從乂為克取柔言無柔克則鄙倍乗之與物俱焚詩曰亂之輯矣民之洽矣燮友主眎眎之明哲為克取柔視無柔克則驕亢不下與物無親詩曰相在爾室尚不愧于屋漏彊弗友主聴聴之聰謀為克取剛聽無剛克則讒毁入焉與物俱化詩曰君子信盜亂是用暴盜言孔甘亂是用餤故先王之為八政分寄四克以治九官食與司徒居于東方以治木徳喜氣萃之貨與司冦居于西方以治金徳怒氣萃之祀與司􅆰居于北方以治水徳哀氣萃之賓與司馬居于南方以治火徳樂氣萃之喜怒哀樂各以中和為節中和之治寄于慎獨禮樂之用著于克己故知中和之本于慎獨禮樂之要于克己者可與言三徳之乂矣凡五倫五典之數不分方位文王之敬止只言父子君臣仲尼之未能兼及兄弟朋友蓋五行之數只有生克生者以為父子克者以為君臣因其父子以制君臣因其君臣以制夫婦夫婦之取于君臣猶朋友之取于兄弟也五倫之間皆有彊弗燮友沈潜高明之别箕子之稱三徳皐陶之稱九徳差數雖殊而要以源本五行綱紀八政翕受敷施以致四克之用其義一也今别為圖以便考焉右三徳四克之圖洪範言三徳皐陶言九徳其實皆五徳也九徳三徳各有克制與河圖相參右九徳配三徳之圖九徳各有克制亦依河圖生成相參右九徳配四克之圖臯陶九徳出于河圖寛栗屬土為正直中和之所立體因而推之北方水徳一柔而立六愿而恭南方火徳二亂而敬七擾而毅東方木徳八直而温三簡而亷西方金徳九剛而塞四彊而義此五徳之方也又别其隂陽彼此相濟始其生者後其成者故一柔而立二愿而恭六亂而敬七擾而毅三直而温四簡而亷八剛而塞九彊而義此五徳之制也蓋以柔立愿恭皆為水徳則近于沈潜故以六為亂而敬觀九河北流天下會同知水徳之高明也以亂敬擾毅皆為火徳則近于高明故以二為愿而恭觀五秩南行萬物相見知火徳之沈潜也以直温簡亷皆為木徳則近于燮友故以八為剛而塞觀壬林之盛萬物出震知柔克之不畸柔也以剛塞彊義皆為金徳則近于彊弗故以四為簡亷觀兑悦之源諸流潔清知剛克之不疇剛也故生于柔者成于剛成于剛者生于柔天道不克剛柔不得故復為四克歸仁圖附焉右四克歸仁圖凡禹臯之學同出于虞廷顔思之學同出于孔氏禹稱三徳臯稱九徳皆以剛柔克化為用顔稱克復思稱中和皆以天人貞勝為本要以變化氣質㑹歸理極則一也人生而稟于陰陽殽于五行以為氣質不過彊弗燮友沈潛高明四端有以克之則氣質皆化為道徳無以克之則性情皆化為氣習中庸稱容敬執别而先以有臨論語稱泰威恵勞而歸于不貪雖不言克制而克制之道彼此互見世儒以此為制伏臣下之方諛而且陋矣或謂河圖主生自水而木而火而土而金故以生為序洛書主克自水而火而金而木而土故以克為序九金彊弗故以七火克之此彊弗之剛克也八木燮友故以四金克之此燮友之柔克也六水沈潛故以五土克之此沈潛之剛克也七火高明故以一水克之此高明之柔克也于義雖通而皇極睿思之理未能甚協要知水火金木各有剛柔非經睿思不能致克仁義禮智亦有孤行本于聖心乃成玅用然則聖人之專言歸仁復禮不有所倚歟曰仁有五生禮有五克仁禮之于五行猶土也然已復已歸之後則非猶土也雷龍神鬼皆出于土而入于土使土猶之五行者則所克不過沈潛所生不過彊弗非復九徳咸事之義矣孟子曰仁之于父子也義之于君臣也禮之于賓主也智之于賢者也聖人之于天道也命也有性焉以性制命以命制性故自孔顔而下為禹臯之學者莫孟子若也性命互克不復為圖别其圖于後焉稽疑章第九七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿事逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用靜吉用作凶聖人作睿而猶有疑思肅乂哲謀而猶有疑事所以參核天人不與鬼神争智也七卜之有五占皆龜也用二衍一皆筮也龜者疇也筮者易也疇之象甚著而其辭已微故用龜者觀其象易之象雖微而其辭甚著故用蓍者玩其辭雨霽蒙易克皆象也象經三兆兆經八體三八二十四以五乗之其體百有二十以十乗之其變千有二百故曰太卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆經兆之體皆百有二十其變皆千有二百然而未盡也何為其未盡也曰古之用法者不一而其取法者常有所不盡易之為象六十四其變四千九十六又再進之為二十六萬二千一百四十四則象不勝指而詞不豫設疇之為數縱横十五分為八方據三而成卦三八二十四以五占之為百二十然其原田各八句股各八圭黍各八或重或單出入戊巳不可以百二十盡也今曰體色墨坼别以四六以五乗之以十衍之為千二百是言其兆耳以言其象則固未盡也圖書兩象其文皆龜也參疇為三通五為九三乗九九七百二十九以兆經之二千一百八十七著陰陽日月之合也方圓為玉横縱為原袤折為瓦三分體卦各二百四十三各有五占雨霽蒙驛克為兆一千二百一十五立三人而參之備兩嵗之日一朞之辰是鬼神所執吉凶之契也吉凶之契不可膠刻而從違之象其變多方總以雒書為據故復為雒書占象如左五占之解舊各不同孔氏以驛為落驛氣不連屬鄭氏以圛為光明色澤光悦然其以水火金木上為序則一也占法殊方古今異變孔潁達云今之川熙兆横者為土立者為木斜嚮徑者為金背徑者為火因兆而細曲者為水賈公彦云兆直丄向背者為木直下向足者為水邪向背者為火邪向下者為金横者為土其實皆不然者五行不専一事五變不專一態為􅇐兆者體色墨坼皆似玉為原兆者體色墨圻皆似于原為瓦兆者體色墨圻皆似于瓦三兆既分然後以五占别之五占可以兼三兆而三兆不可以兼五占故言五占而不言三兆也然則雨之為象三兆皆雨霽之為象三兆皆霽蒙之為象三兆皆蒙驛之為象三兆皆驛克之為象三兆皆克則何適主與曰以事為主古之用簭有九用龜命八一征二象三與四謀五果六至七雨八瘳又云立君大封大祀大遷大師大喪是于五者各有好惡猶月之從星而有風雨也然則五占之用獨貴霽克者何也曰火土者天地之晝氣也命雨而得霽命霽而得克則無為貴霽克矣然則玉兆皆無墨坼而貴璺食深晣者何也曰璺食者日月之交氣也大象不衍大謀不私亦無為貴墨坼深晰矣然則古之用火灼龜何也曰人生于日日灼于地而百草以蕃春夏自南而北秋冬自北而南視高􅅡箠則取于此也然則火灼龜而成體兆日灼地而成煇祥大地之煇祥著于龜腹之體兆而聖人獨以龜腹尚于日煇者何也曰日煇尊也尊命于天不可以旦告龜腹親也親命于人則可以旦告然且聖人不廢眂祲亦猶之占兆也然則食貨祀司空司徒司冦賓師以其位而取之乎抑以其兆而取之乎曰以其位而取之也以其位取之而又眎其所交别其體色墨坼則未有遯者矣然則一九之交曰食與師而亦曰司空司冦三七之交曰祀司冦而亦曰食與賓二八之交曰貨與賓而亦曰祀與司徒四六之交曰司空司徒而亦曰貨與師一方四官一象兩治五占雜應奚取之乎曰取其正者而其應交厲然則五行所屬圓圖正位不復為據與曰其數固自在也金火交于西南水木安于東北易曰利西南言其交者也曰不利東北言其不交者也象不交則不神道不交則不通水火木金變色致氣以動天地日煇動而著龜北動而微聖人取微焉耳然則占象之猶有異同何也曰精魄著人思擬各别日煇射旁而左右異視連山之時未有歸藏歸藏之時未有周易然且顓頊黄帝不循一師然則聖人亦有悔與曰何為其無悔也不悔則不動不動則卜筮可以不設卜筮可以不設則煇祲可以不眡煇祲可以不眂則日食彗隕皆無可動聖人者而聖人之智尊于鬼神大于天地五占灋既不傳眂祲亦五占之屬故復以厯代氛祲繫焉煇占紀異漢高帝七年六月月暈圍參畢七重應白登武帝建元二年四月戊申如日夜出厯衛氏建元四年夏有風赤如血風師見狀如亂鬊昭帝元平元年正月壬子元平二年二月乙酉祥雲如狗夾漢西行元帝永光元年四月日青白无景應石顯成帝建始元年八月戊午兩月重見應王氏河平元年正月壬寅日月皆赤無光中食墨永始二年二月癸未東南有赤氣索索如樹應樊並蘇令哀帝建平元年正月丁未疋練南行聲如雷王莽地皇元年二月壬申日正黒世祖建武七年四月丙寅日抱白虹貫暈齒中元元年十一月甲辰月中衆星出入齒章帝建初元年七月屢有白虹貫日應竇憲和帝永元十六年四月紫宫著粉絮應大喪殤帝延平元年夏冬日屢有璚背兩珥暈順帝永建二年六年春屢有虹貫日珥永和六年正月己夘白虹貫暈兩珥突兩珥桓帝建和三年二月己巳黄氣抱日靈帝熹平二年八月白練衝北斗主兵光和元年六月丁丑天投蜺墜温明殿中平五年正月日中墨食如飛鵲日獻帝初平元年二月壬辰白虹貫興平二年十二月月重暈兩珥在端門先主章武三年冬月暈北斗應永安宫晉武章泰始元年七月日暈再重貫白虹泰康元年正月己丑朔雜氣貫日有光恵帝元康九年正月日中墨食如鷰晝晦永康元年正月癸亥朔日暈三重冬永興元年冬日中有墨分著是年十二月壬寅夜赤氣有聲光熈元年五月壬辰日散如血流映地是年十二月甲申白氣若虹夜見五日懐帝永嘉二年二月白虹貫日有暈五重永嘉五年三月庚申日散血中著墨燕愍帝建興二年正月巳巳朔霧著人如墨建興二年正月庚申有日隕别光逆行建興五年正月庚子日三出重暈兩珥珥元帝大興元年十一月乙夘日夜出有永昌元年十月京師大霧晝晦貫日成帝咸康元二八年屢有白虹穆帝永和十一年日中著墨見三足鳥帝奕六年三月辛未日暈五重貫白虹孝武太元十三四年日屢有黒子有背璚安帝隆安元年十二月壬辰日暈元興元年二三月白虹屢貫日應桓𤣥璚義熙元年五月日冇采珥六年五月有義熙七年七月五虹射東方白虹應革命恭帝元熙二年日兩直珥貫宋文帝元嘉四年晝晦十日自是天下無王元嘉三十年正月朔青黒氣覆宫殿梁武帝太清二年五月有兩月相承如鉤景太清三年正月庚申白虹貫日三重應侯元帝承聖元年十一月丙子見兩日應革命陳文帝天嘉七年二月庚午日無光烏見宣帝太建五年六月西北黒雲屬地散如豕太建十二年壬寅白虹見西方周武帝天和二年十月黑杯食日六日乃滅隋文帝仁夀四年七月乙未日青八日乃復煬帝大業十三年十一月辛酉日光散如流血唐太宗貞觀十一年七月朔黃氣竟天貞觀十七年四月青氣遶東宫殿天貞觀十八年六月壬成青黒氣亘高宗咸亨元年永淳元年春日皆如赭三日中宗景龍二年七月癸巳夜赤光照地𤣥宗開元二十九年三月丙午晝昬天寶三年正月庚戌日暈五重代宗寶應元年七月赤光貫紫微大光明年幸陜吐畨入長安大厯二年七月日旁屢建旗白氣亘天大厯二年十月黒塵彌北方大厯三年正月日屢有青赤冠珥黒暈徳宗貞元二年閏五月壬戌日有貞元二年十一月壬午赤氣五出亘天李錡憲宗元和二年十月壬午日傍獻馘應元和十三年十二月丙辰白虹東西亘