熹四年南宫武庫屢有火所在盜起延熹五年宫中六處火諸常侍主災延熹八年宫中火八九處立竇皇后獄延熹九年火流京師民相驚是有黨靈帝熹平四年延靈園災内署悉司中官光和四年掖庭災五年永樂宫災張角亂中平二年雲臺災延及諸殿盗冦幽冀諸州晉武帝太康十年崇賢殿災應在諸卿惠帝元康五年武庫火兆廢子遹王主災永興二年尚書曹火延諸閣道諸懐帝永嘉四年襄陽大火應在洛陽上受之元帝永昌二年京都大火王敦主災明帝太寧元年京師火王敦主災劉趙應之成帝咸和二年京師火蘇峻主災穆帝永和五年石趙諸殿災乃滅武帝寧康元年京師火桓温受之太元十三年延賢堂災及則百堂道子為政安帝元興元年尚書曹火桓𤣥主災義熈十一年京都大火兆在彭城公宋文帝元嘉七年都下火子劭主災元嘉廿九年都下火應在子劭是有乖禮梁武帝天監元年盜燒總章觀普通二年琬琰殿災亦為禮罰中大通元年災正同泰陳武帝永定三年重雲殿災是為捨身隋大業十二年廣陽門災是為自焚唐太宗貞觀三年甲弩庫火大喪摩可汙貞觀十三年雲陽石自燃是有思證聖元年周明堂火火正水所未滅也景龍四年凌空觀災應在神龍殿𤣥宗開元五年定陵寢殿火是亦有乖禮開元十八年飛龍廐災是主王毛仲天寶二年東都災不絶是有禄山之變天寶十載武庫災應在親仁坊大厯十年火従浮圖中出田承嗣主災延齡徳宗貞元十三年東都尚書省災主裴長慶三年幽州地有火變為池應在清思院文宗太和二三年禁仗火亂在興元太和八年禁中及揚州火李仲言主災都昭宗大順二年雨與火鬭於汴盜䧟成後唐天成四年火燒汝州營東西川亂長興二年汴州災殺安重誨宋太祖建隆三年京輔火是擴都城開寶八年洋磻亳永四州火太平興國九年乾元文明二殿災應在廷美雍熈二年楚王元佐宫焚廢元佐端拱二年有鳥銜火燔衡州作開寶寺塔淳化四年永州大火夏攻靈州盜䧟成都景徳四年郢州火有喪火延秘閣是燔天書大中祥符八年榮王宫仁宗天聖七年昭應宫災是燔天書明道元年火燔八殿應在元昊英宗治平四年睦親宫火應在新政神宗熈寧七年三司火應在條例元豐八年開寶寺火焚試卷應在新學建中靖國元年集禧觀火蔡京主災政和八年掖庭大火災在神霄九鼎在上皇髙宗紹興元二三四年行在皆火應紹興九十年行都又火秦檜主災岳飛紹興十一年婺州建康大火是殺紹興十二年行都又火金來冊命紹興二十年行都又火秦檜受之乾道二年諸州軍壘火以示罷兵是禁偽學淳熈七八九年吳越楚蜀諸郡火光宗紹熈二年行都及徽州大火中宫主災嘉泰元年行都大火民舎幾盡乃弛學禁嘉泰四年行都大火撤廟移主韓侂胄主災嘉定十一十二年行都火災應在大慶殿理宗寶慶四年行都大火延太廟應在李全嘉熈元年行都大火輿訟濟王竑元順帝至正元年臨安大火大都元祚乃訖至正二十年火流自華出焚炎上之災鮮有不應者然亦至喪亂而衰矣熒惑之勤不及冦攘漢自靈獻而下唐自敬文之餘寡稱焉亦以卓傕巢温灰燼已極奸人騁於波濤工匠輟其盤礴人竇既塞天巧亦紆也獨在南宋行都省署無日不災朱盜之决滑河學徒之焚館舎與乾道嘉泰之間天人互用均致其罰也大率火為禮候水為淫徵禮失而冦攘為災國淫而奸邪縱肆致萬乘之底於滅亡火輕則為喪水輕則為盗思亂先治存乎禮法漢儒所分以耀虚偽縱情欲為火不炎上簡宗廟廢祭祀為水不潤下尚有偏觀未為通論也木行汨叙魯僖公三十三年冬李梅實君不制主災漢惠帝五年冬桃李花棗實近恒燠也昭帝時斷栁起生枝葉應在戾園昌邑國社枯樹復榮亦應在戾園元帝初元四年王氏墓梓柱榮生莽乃生建昭五年山陽槐樹斷復起應在民社復成帝永始元年河南樗樹生人頭應新都侯哀帝建平二年西平仆柱生人形應董賢建平三年零陵大樹斷自續應同山陽槐桓帝延熹九年洛陽竹柏葉自傷應黨錮靈帝熹平三年右校樗樹暴化人形應傕汜熹平五年殿後槐皆反撥後主景耀五年宫中大樹自折漢遂滅建安十五年洛陽伐樹見血災應伏氏晉惠帝元康九年桑暴長東宫廂應太子遹永康元年東宫桑又暴長應皇孫臧西明木變胡形是應劉曜壯武桑化為柏是應張華懷帝永嘉二年項縣桑哭應東海王越永嘉六年豫章樟復榮應瑯琊元帝太興四年王敦鈴仗生菡萏敦主災明帝太寧元年剡縣木生人面災在越城成帝咸和六年曲阿栁起吳縣榆起應瑯琊哀帝興寧三年廬陵栗樹復起應在昌明帝奕太和元年涼州楊生松應張天錫平陽齊後主武平五年鄴城桐作人形應在隋文帝開皇八年人家桁生條箠楚為災仁壽元年蘭州楊生松是易樹子唐高祖武徳九年樓柱傾復起𤣥武門主災長壽二年神宫檉杉皆變為柏應女乘男徳宗貞元四年雨木於陳畱神策士主災憲宗元和十五年樹無風自抜中尉主災懿宗咸通十四年成都李實變木瓜主易姓宋太平興國六年解木有字是兆天書神宗熈寧二年建州獲木龍災應新法易種髙宗紹興廿一年桑生李栗生桃是為孝宗淳熈十六年桑生瓜櫻桃生茄災光宗紹熈五年行都雨木韓伌胄主元世祖十九年樟樹生梨實主革命澤滅木順帝至正廿二年祥符樹皆蒙泥象曲直之災始於桑穀草實之瑞表於嘉禾雖見書序聖人不録蓋其取用既繁而見沴者少不得云田獵不反宿飲食不節便釀是災要知賢奸不别邪正不分則榱棟几筵皆成災具矣天水而後爭言連理木芝草解文為瑞其實賢否不别朋類混淆如木枝理不循彞序皆妖孽也金行汨叙威烈王廿三年九鼎震秦人應之顯王三年雨金於櫟陽赧王五十九年秦取鼎一淪泗水孔氏應之漢武帝征和二年春涿郡鐵飛應在巫蠱成帝河平二年沛郡鐵鳴冶為分災應諸舅曹魏明帝時西取承露盤銅狄有涕晉惠帝元康三年殿前六鐘皆涕應在金墉永興元年成都王軍㦸刃皆有火應在蕩隂懷帝永嘉元年石碑生金應在石氏石勒時鄴城銅雀飛入海陳後主貞明二年東冶鐵飛光隕自天有兵唐垂拱三年魏州出鐵船廣州雨金是神龍元年東都鐵像頭自隕是誅亂宫左相天寶十載殿鐘自鳴饍鼎鬬折耳足應肅宗乾元二年渾儀汙應在西内長慶中閣下鈴自鳴昭宗光化四年殿前鐘忽嘶應式微漢乾祐元年中書厨釜鳴郭威主災宋建隆二年神山縣有方鐵汎水是釋重兵至道二年桂陽鎔銀自成山岳是為佞金咸平四年亳州太清宫鐘自鳴是為媚鐘慶厯四年撫州得生金山是冊元昊崇寧四年禮九鼎漏於北方是兆燕雲之禍紹興十一年金人戈㦸夜生火光是將銷刃紹興廿六年天雨汞是外大喪聽學禁寧宗慶元二年吳縣錢羣飛是凡從革汨行皆為兵戈之咎不專若鐵銷羣飛而已隋堯君素守蒲州兵器夜有光如火劉武周據并州矟刃夜毎有火光晉成都王伐長沙戈㦸上夜皆有火光此即金不從革與火災相通聰不作謀之罰也如金石之變寥寥耳石言於晉寶化為石自不在此例土行汨叙周幽王二年三川皆震是徙厥都覇主應魯僖公十四年八月辛夘沙麓崩魯文公九年九月癸酉地震災應公子遂襄公十六年五月甲子地震災應季孫宿昭公十九年五月己夘地震季氏主災復昭公二十三年八月乙未地震公疾乃哀公三年四月甲午地震應在啟陽築秦始皇十五七年平隂大震是多營漢惠帝二年正月隴西地震應在吕氏髙后二年武都山崩震自正月至八月文帝五年二月地震在匈奴景帝後五年地震應武帝元光四年五月地震應在後宫後元元年秋七月地震應在鈎弋宣帝本始四年河南瑯琊大震應在霍氏災地節二年八月大震壞宗廟城郭霍氏主元帝初元二年二月大震殺蕭望之永光三年冬地震石顯主災成帝河平三年犍為山崩壅江震氏元延三年岷山崩江逆流應在王綏和二年九月丙辰大震應在皇躬新室天鳳三年二月地震壅涇水建武廿二年郡國四十二地震應武谿蠻章帝建初元年三月山陽東平震和帝永元元年會稽南山崩竇憲主災永元四年郡國十三地震竇氏應之永元七年九月京都震鄭衆蔡倫主災永元九年三月隴西震應在羌永元十二年夏秭歸山崩兆廢隂后元興元年雍地裂殤帝延平元年恒山崩應在清河在鄧氏安帝永初元年郡國十八地震應永初二年至五年郡國三十五震永初六年豫章原山崩震永初七年春郡國十八地震太后主災元初元年春日南池坼郡國十五地震元初二年河南地坼郡國十地震元初三年至六年郡國九十地震永寧元年郡國二十三地震建光元年冬郡國三十五震延光元年春郡國二十七震秋十三震崩延光二年京都郡國三十二震丹陽山延光三年京都郡國二十三震閬中山崩延光四年京都郡國十六地震越巂山崩凡安帝永初至延光十九年郡國京師三百七十餘震災異頻仍蓋戚畹女謁閹寺之盛未有過於安順之際者也順帝永建三年春京師漢陽大震君主災陽嘉二年洛陽地坼京師震山陽陽嘉四年冬京師地震八地震梁冀主災永和二年至五年京師漢安二年秋至建康元年夏百八十日震固桓帝建和元年夏秋京師再震殺杜喬李建和三年秋京師震憲陵屋壞郡國地裂和平元年秋梓潼山崩元嘉元年二年冬春京師震王甫主災永興二年東海朐山崩瑯琊盜起永壽二年京師震河東地裂中山崩延熹元年雲陽地裂三年漢延熹四五年京師地震泰山博尤來山解延熹八年京師震緱氏地裂永康元年洛陽上黨地裂河東地大裂靈帝建寧四年春地震夏熹平二年夏地震六年冬地震捕繫諸生震光和元年至三年京兆及酒泉地八十餘獻帝初平二年夏地震應關東諸侯興平元年夏地震應在關東後主炎興二年蜀地震黄皓主災魏咸熈二年太行山崩乃亡晉武帝太始四年泰山崩五年地震咸寧二年秋河南河東地震咸寧四年夏隂平廣武洊震兆在賈氏泰康五年宣廟地䧟六年新興山崩泰康七年瀘山崩震仇池崖隕楊泰康八年殿前地䧟震應在三泰康九年郡國嵗十六震諸王應之皇躬泰康十年冬永熈元年春地震災當惠帝元康元年冬京師震震陷賈氏主災元康四年郡國山崩地大元康五六八年地震年震當陽地裂諸王主災太安元年西墉崩二太安三年夷道山崩四年酃山崩張方主災懐帝永嘉元年洛陽地䧟有蒼鵝出永嘉三年四年諸州地震劉石主災愍帝建興二年三年地震元帝太興元年二三年諸郡震崩王敦主災太興四年常山崩滹沱溢段匹磾祖逖殁成帝咸和二年春夏郡國震峻主災咸和四年廬山西北崖崩盜殺劉𦙍穆帝永和元二三四五年地震應在失柄永和九十十一年地震政在桓氏哀帝隆和興寧三年俱震水湧應在海西帝奕太和元年涼州地震孝武太元二年至十八年地生毛屢震羣小主災安帝隆安四年地震生毛義熈三四五八十年地生毛震䧟是將易姓宋文帝元嘉十二年都下地震劭濬主災孝武大明七年兖州大震是應玉燭殿亡故齊東昬永元元年秋冬震百八十日為梁天監五年冬京師震是主刺史叛普通三年正月京師震義州大同三年七年建康地震生毛是主饑兵太清三年建康地震臺城主災陳永定二年建康地震應在王琳應後魏武定二年西河地䧟髙氏為後齊河清二年并州地震應和士開宫隋文帝開皇十四年夏京師震主中開皇二十年十一月戊子立子廣天下大震仁夀二年夏岐雍大震廢蜀王秀仁壽三年梁州山崩漢諒主災唐武徳二年京師震殺劉文靜武徳七年巂州地震山摧突厥主災皇太宗貞觀七年冬京師地震應在上貞觀二十三年河東晉州大震當上躬始封高宗永徽元二年晉州定襄洊震應在儀鳯二年永淳元年垂拱三四年京師皆震垂拱二年雍州湧山永昌中華州山畫徙睿宗景雲三年并汾絳三州震應在内禪𤣥宗開元十七年藍田山槯應楊思朂開元廿二年秦州大震應李林甫開元廿六年京師地震不利立子肅宗至徳元載河西震裂是應安史主災代宗大厯二三年京師地震魚朝恩大厯六年藍田西原䧟九年同州山徙大厯十二年寧晉地裂應在元載徳宗建中元年三四年京師震李希烈主災貞元二三四年京師洊震地生毛應吐番貞元八九十年洊震湧樹應在諸鎮憲宗元和八年大隗山崩地震元和十十一年洊震皇甫鎛主災中尉主災元和十五年春正月穆宗即位震文宗太和九年京師大震仇士良主災開成四年京師震仇魚主災宣宗大中二年河西大震有喪兵懿宗咸通八年晉絳州大震主僖宗乾符三年雄州地䧟水湧羣盜應之光啟二年洊震三年維州山崩壅江水後唐長興三年赤畢山崩秦王從業主災宋雍熈三年階州山崩壅江水應契丹宋真宗景徳元年京師地洊應在澶淵景徳四年益州地震有喪大中祥符二四年諸州地震應在中宫仁宗景祐四年忻代并大震元昊主災寶元元年慶厯三年并忻代震是應西夏慶厯六年嘉祐五年京師地震應中宫神宗熈寧元年秋冬郡國大震王韶主災熈寧五年少華山崩元豐八年京師震賓州地䧟應皇躬應紹述哲宗紹聖元二三四年諸郡地震是建中靖國元年冬太原震童蔡主災宣和六年京師洊震熈河蘭州地䧟髙宗建炎二年長安大震金遂入災紹興三年六年江南大震劉豫主孝宗隆興元年洊震湯思􅅲主災光宗紹熈四年劍門山崩寧宗慶元二年黄巖有山自徙清潭山移韓侂胄主災嘉定九年東西川大震山崩元成宗大徳七年延安山移地震應在緬甸大徳八九十年晉平陽屢大震應在懷宣仁宗延祐元年諸路地震應在君身延祐三四五年諸路地震泰定帝四年諸路震應在君身漠北文宗天厯二年諸路地震應在順帝元統二年京師震山䧟為池至元元年至五年諸路皆震至正元年至十二年諸路洊震震元祚乃訖至正十三年至廿八年諸路皆六府言榖五行言土土非榖也雖云稼穡言其作稼穡者不指稼穡如山川疇列不即云畝澮也土自應地饑自應歲故以百榖用成對庶草蕃廡言之如土行失序自當以山崩川竭大地震動為主蓋土比四行其用至大故上天見災譴告至宻猶之思睿無所不談不得移省歲之文於作甘之内也以上百八十餘條惟宋自景徳而上至少惟漢自永元而下至多坤儀不靖雖建武亦有崩摇前座將傾在建康屢先著兆五代之餘天告已衰至正之間地維遂絶觀其震數反於睿思亦可以作聖也八政章第五一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師八政之行不依疇列其以八官寄於四方王立於中則猶之疇序也但其數目不用為次耳古人制象彼此相兼不定一方要以河圖為體洛書為用體不過一易用有三易五易九易者如八政與皇極合為九疇先行南北一食在北二貨在南三宗伯從左四司空從右司冦據七司貨於南方司徒據六司食於北方賓以震出據八而從宗伯師以順動據九而從司空此其始易者也又因而逓更其位則一食居三立於左内二貨居四立於右内三祀居二立於南内四司空居一立於北内五司徒居八立於外東六司冦居九立於外西七賓居七立於南外八師居六立於北外此其再易也五行為易之佐八政為易之官隂隲相協皆在八政為圖如左凡八政官位皆以五前為内方五後為外方刑徳剛柔可以義取師與司冦不處左方賓與司徒不立右際食祀之位親於司徒工貨之官隣於司宼亦情分之當然人天所共叶也及其用之乃有一八二七三六四五對待之文各見下章右八政分配之位唐虞官百夏殷再倍三司相協乃約五命度其兼職可以義推右八政互易之位八政互通而晨用乃備食一為比政實本地徳始平水土稼穡乃成徒衆乃興徂征之命是也天子南面賓祀在前五玉三帛夾以虎旅暨覲羣后無有不服寅清之命是也東作敷教亦治邦政田賦出焉三八之間爰通賓食稷契共事以輔文思在寛之命是也寇盗奸宄厥厲在貨禹及皋陶共理夷夏萬物歸命為刑為徳明允之命是也王中無為省視八官内體五事微察五行明察五紀禀此十五以成福治五者為福六者為殛十一之行過猶不及因而推之北方坤坎有食與師統於司空是為地官而兼司空司馬南方乾離有貨賓祀而統宗伯是以宗伯而兼司徒司冦東方離震有賓與食而統司徒是以司徒而兼宗伯司空西方坎兌有貨與師而通司冦是以司冦而兼司空司馬故謂唐虞世有專官官不相兼者亦偏結未融矣其九列命官配於八卦以先後天分序别圖如左右先天序卦政官之位序卦本於河圖其體屢遷而四方八位理有一定疇象相參約歸二者不可易也右後天序卦政官之位凡易在範前疇序皆出于易雖云後天出于文王而帝出乎震齊乎巽相見乎離役乎坤悅乎兌戰乎乾勞乎坎成乎艮決非自文王時始有此說也先天圖至宋始出而位置如在易前要其顯晦有時而源爛遠矣洪範八政雖自為疇列而從圓圖以變方圖合先後天初無乖異圓圖以相代為義毎方各備四方方圖以相交為義毎官各備兩卦每卦亦備兩官如民食于土故坤一為食食重于賓故震八為賓賓貴從祀故離三為祀祀歸司空故兌四為司空此先天之左旋從坤趨乾者也師動大衆故乾九為師師必居貨故巽二為貨貨必有冦故坎七為司冦冦歸司徒故艮六為司徒此先天之左旋從乾趨坤者也其官方分拆雖不依位而五行陰陽命官之意本于圓圖不少爽也又如後天乾統六師以處西北坎為司空以一次之司徒治地亦為司空以八次之震司東作亦為司徒以三次之巽治貨賦亦為司徒以四次之離居乾位是為司冦以九次之司冦與司空對治坤居西南是為秩宗以二次之秩宗與司徒對治兊掌賓政亦為秩宗以七次之賓政與食政對治是後天八政亦本圓圖大要以西方之政通于北陸北陸之政通于東方東方之政通于南陸南陸之政通于西方其南北東西不相易也故一六二七水火不相射三八四九金木不相代云臣攷周易與洪範表裏而周官一書皆出于九疇雖云六官三百六十屬而以八政齊之各復得八則通為六十四官三百八十四屬矣八政雖無天官司馬宗伯之目而食貨𨽻于天官賓祀載于宗伯六師統于司馬職有繁簡則政可相資總以分代天工陰隲相協故復舉八政兩序與卦象分配焉八政疇序先天圓圖一坤食二巽貨三離祀震四兊司空六艮司徒七坎司冦八賓九乾師一食政土行坤序食之食坤以厚徳載物其于政也以祖識地徳其于物也為反生為上供其于官也為后稷農師為饍庖人食之貨升以積徳高大其于政也為日中市尚榖帛其于物也為耒耜釡布瓻甑其于官也為甸師獸􅈄鼈人食之祀明夷以用晦莅衆其于政也為農稷報賽其于物也為脯腊修鱐㫖酒其于官也為酒正充人亨人􅐪人食之司空臨以教思容保其於政也以省試稱事其于物也為頒冰形鹽其於官也為醘人漿人凌人食之司徒謙以裒益平施其於政也為頒禄施斂其於物也為簠簋斗斛其於官也為稍人委人倉士廪大夫食之司冦師以容民畜衆其於政也以謹蓋藏厲濫禁其於物也為藥石疾毒其於官也為食醫疾醫􅅑醫食之賓復以閉關養陽其於政也以享老字幼其於物也為觴豆几杖户牖其於官也為司尊彞几筵幕人食之師泰以裁成輔相其於政也為養壯佼禮俊民其於物也為耤田為采為廩餼其于官也為内外饔為鬱人鬯人玉府二貨政木行巽序貨之貨巽以申命行事其於政也以利民阜財其于物也為矯揉箘簵輪梓其於官也為太府内外府貨之祀家人以有物有恒其於政也以贊佑神明其於物也為嶧桐泗磬菁茅畎翟其於官也為典路為都家宗人貨之司空中孚以議獄緩死其於政也以禬䘏賑助其於物也為磬錯璆鐵鉛松怪石其于官也為追師卝人蜃人掌炭貨之司徒漸居賢善俗其於政也以登良散楛其於物也為漆絲纎縞織皮其於官也為司㑹職嵗貨之司冦渙以享帝立廟其於政也以散小貯禁賄賂其於物也為包為篚其於官也為關梁司門貨之賓益以遷善改過其於政也以逺玩賤貨厚往薄來其於物也為盤鑑劍屨生死贄其於官也為掌節典庸器屨人鞮鞻氏貨之師小畜以懿文徳其於政也以平物價治軍市其於物也為金錯圜刀羽毛齒革其於官也為質人廛人角人旄人靺師貨之食觀以省民設教其於政也以引菲示儉其於物也為絺綌紵枲其於官也為場人囿人稻人三祀政火行離序祀之祀離以繼照四方其於政也以明禋鬷格其於物也為陶匏繭栗其於官也為宗伯肆師大小司樂祀之司空暌以同而異其於政也以瘞骼掩胔其於物也為俎栁廞具明器其於官也為喪祝甸祝冢人墓大夫祀之司徒旅以慎不留獄其於政也以禮山川墳衍原澤其於物也鼗鼓琴瑟羽籥其於官也為籥師典同宫人掌次祀之司冦未濟以辨物居方其於政也以戢止淫厲其於物也為砮丹畫干戚其於官也為占夢眂祲馮相氏祀之賓噬嗑以明罰勅法其于政也以敬慎蠲日諏士其於物也為龜簭桃箠其于官也為大小史司裘司祧祀之師大有以遏惡揚善其于政也以類禡祖社其於物也為樊纓禭旃旟旐其于官也為典瑞太卜太祝庭氏射鳥服不氏祀之食晉以自昭明徳其于政也以餕餘逮下其于物也為犧牲粢盛其于官也為宫伯内宰籩人羃人祀之貨鼎以正位凝命其於政也以貞媺起度除慝其于物也為球圖刀訓圭瓚鼐鼒其于官也為軍車典祀内外宗四司空政金行兌序司空之司空兌以麗澤講習其於政也以諏四民興利去害其于物也為度量權衡繩準其于官也為山虞林麓川澤人司空之司徒咸以虚受人其于政也以胥原茇曠土其于物也為鎛函盧弓車其于官也為土均土訓旅師司空之司宼困致命遂志其于政也以治邊境去盜去虣其于物也為蕃薄渠答虎落其于官也為掌固掌險掌彊司空之賓隨以嚮晦入息其于政也以簡庶務理廢墜其于物也為舟梁隄防其于官也為懐方合方野廬氏司空之師夬以施禄及下其于政也以度田徹糧正車賦其于物也為畝澮隍墉牛馬駒犢其于官也為職方載師圉師邍師遂大夫司空之食萃以庀戒不虞其於政也以宅流宥訓討無藝其於物也為邊市租萑蒲舟鮫其于官也為柞氏薙氏庶氏穴氏司空之貨大過獨立不懼其於政也以治材木施棺槨其於物也為築冶摶埴䩵裘其於官也為川人澤人封人司空之祀革以治厯明時其于政也以表方正位相民居其于物也為璿璣玉衡其於官也為雞人保章氏五司徒政土行艮序司徒之司徒艮以思不出位其于政也以安民不遷敷教成治其於物也為城郭壇壝象魏其于官也為黨正州長鄉大夫司徒之司冦蒙以果行育徳其于政也以去殺勝殘其于物也為鼓為舞為觥樸為桎梏其於官也為司諌司救司徒之賓頤以慎節養正其于政也以明實信罰褒有行其于物也為法簡賢書其于官也為師氏保氏司服司禄司徒之師大畜以多識言行其于政也以文徳致民彚士其于物也為金玉象鉤為旂為鐸其于官也為内外史為行司馬為匡人撢人司徒之食剥以厚下安宅其于政也以薄斂蠲逋其于物也為公田公桑耕耤其于官也為典命掌葛掌染典婦功司徒之貨蠱以振民育徳其於政也以嵗時勞士出市陳納新其于物也為泉布疏纊其于官也為閭師司司徒之祀賁以明庶政無敢折獄其于政也不廢誥誓其于物也為井竈户行門霤其于官也為司盟司約司徒之司空損以懲窒忿慾其于政也以明正疆界其于物也為表署道路杵臼鍛厲其于官也為閭師比長酇長形方氏六司冦政水行坎序司冦之司冦坎以徳行教事其于政也以布憲讀法禁非刑亂其于物也為五書五戒五極其於官也為卿為鄉士遂士朝士士師司冦之賓屯以經綸其于政也以詢衆致謀其于物也為牆垣鉶豆牢飡其于官也為伊耆氏為掌客環人挈壺氏司冦之師需以飲食待時其于政也以先治内後治外其于物也為矛㦸斧鑕其于官也為司𨽻掌察條狼氏修閭氏司冦之食比以建萬國親諸侯其于政也以除蠱服猛不餧辜人其于物也為㝠羅壺涿其于官也為翦苃諸奄獸醫司冦之貨井以勞民勸相其于政也以弛責焚券其于物也為鍰金矢其于官也為職金司市司冦之祀既濟以思患豫防其于政也以用儺致閉息老物其于物也為貍沈疈辜其于官也為司烜司爟司寤氏司冦之司􅆰節以制數度議徳行其于政也以鍵閉慎固察創視坼其于物也為釁浴兆域其于官也為司圜為雍人萍氏司冦之司徒蹇以反身修徳其于政也以執簡正禮其于物也為嘉石肺石其于官也為司刺調人詛人七賓政木行震序賓之賓震以恐懼修省其于政也以興滅繼絶有慶有刑其于物也為宗彜丹圖其于官也為大小行人行夫賓之師大壯以非禮不履其于政也以大饔射選士澤官其于物也為虎熊豹豻正鵠其于官也為司勲司士諸子賓之食豫以崇徳殷薦其于政也為臨雍乞言餕飫其于物也為四齊八珎其于官也為五更三老賓之貨恒以立不易方其于政也以敷秦明庶命車服其于物也為圭馬璋皮璧帛琮錦琥繡璜黼其于官也為司儀掌賄賓之祀豐以折獄致刑其于政也以聽質平外國其于物也為膰脤珥刉其于官也為都家宗人甸祝神士賓之司􅆰歸妹以永終知敝其于政也為協出入止逋藪其于物也為㕓舍郵次其于官也為象胥土方氏賓之司徒小過以致恭致哀致儉其于政也無忘舊章其于物也為折俎殽烝其于官也為掌客都則都士賓之司冦解以赦過宥罪其于政也以柔逺無以暴令其于物也為櫜為符節其于官也為御史為掌交掌訝八師政金行乾序師之師乾以自彊不息其于政也以止戈克詰爰有七徳其于物也為剛馬戎路其于官也為太御太僕大小司焉師之食否以儉徳辟難其于政也以庀糧構不貪逺功其于物也為米粟秸服銍總其于官也為載師縣師遂大夫師之貨姤以施誥四方其于政也以軍爵賚武衛其于物也為鹽鐵雜錯其于官也為馬質師兵掌賄師之祀同人以類族辨物其于政也為蒐苗獮狩别井里物采其于物也為饁獸表貉獻禽其于官也為戎僕田僕圍師巫馬師之司􅆰履以辨分定志其于政也以保疆靖民治溝洫阸塞其于物也為虎皮魚服其于官也為道僕牧師庾人繕人藁人師之司徒遯以嚴逺小人其于政也不以介胄溷文治其于物也為介胄犀兕其于官也為犬人𨽻僕閽入寺人師之司冦訟以作事謀始其于政也以靖姦宄威蠻夷其于物也為彤弓彤矢盧弓盧矢其于官也為虎賁旅賁師右趣馬師之賓无妄以對時育物其于政也以顯忠遂良尊賢禮士其于物也為秬鬯鍾卣其于官也為準夫牧伯大都阪尹吉士右八政一篇依圓圖為序八政一章既無敷言又從無繫屬蘇洵以五紀八政皆不可牽合是也然自古無位次汨陳之書亦無離圖書自為倫序之物今如先天一坤九乾二巽八震三離七坎四兌六艮皆以五十相合分而行之則坤行從右有巽離兌之三陰以為食貨祀司􅆰乾行從左有震坎艮之三陽以為師賓冦司徒其以父母均分六子一也其所不得不易者乾兌離震陽畫左旋巽坎良坤隂畫右轉不得不依兩畫為序故以一九二八三七四六分為食師貨賓祀冦􅆰徒則坤乾巽震離坎兌艮八卦分政燦然明矣易曰天地定位山澤通氣雷風相薄水火不相射又曰雷以動之風以散之雨以潤之日以暄之艮以止之兌以悅之乾以君之坤以藏之皆以一九六四八二七三相涵為序也故範疇之數金水木火皆以首尾相應内嚮為序猶九六七八之合為十五也初學矯强意為安排知食貨賓師之類皆以對待起卦以乾坤坎離為例不知其初出圓圖本于自然有倫有脊無復繁簡出入之殊若以意為之則谿竇百出去古滋逺矣今再以後天八政屬綴如左又八政疇序後天方圖一坎食二坤貨三震祀四巽司􅆰師六乾司徒七兌司冦八艮賓九離一食政坎序為司􅆰坎亦食之食坎以常徳行習教事食之貨師以容民畜衆食之祀解以赦過宥罪廟食之司􅆰渙以享帝立食之司徒訟以作事謀始食之司冦困以致命遂志食之賓蒙以果行育徳居方食之師未濟以慎辨物二貨政坤序為祀坤亦貨之食比以建萬國親諸侯貨之貨坤以厚徳載物貨之祀豫以崇徳殷薦教貨之司􅆰觀以省民設貨之司徒否以儉徳不榮貨之司冦萃以備戒不虞貨之賔剥以厚下安宅貨之師晉以自昭明徳三祀政震序為食震亦祀之食屯以經綸祀之貨復以閉關祀之祀震以恐懼修省過祀之司􅆰益以遷善改祀之司徒无妄以茂對時育萬物祀之司冦隨以嚮晦宴息祀之賓頤以慎節養正法祀之師噬嗑以明罰勅四司􅆰政巽序為貨巽亦司􅆰之食井以勞民勸相司􅆰之貨升以順積徳司􅆰之祀恒以立不易方事司􅆰之司􅆰巽以申命行司􅆰之司徒姤以施命誥四方司􅆰之司冦大過以獨立不懼司􅆰之賓蠱以振民育徳司􅆰之師鼎以正位凝命五司徒政乾序為師乾亦司徒之食需以宴樂待時司徒之貨泰以財成輔相司徒之祀大壯以非禮不履司徒之司􅆰小畜以懿文徳司徒之司徒乾以自彊不息司徒之司冦夬以施禄敷徳司徒之賓大畜以多識畜徳司徒之師大有以遏惡揚善六司冦政兌序為賓兌亦司冦之食節以制數度議徳行司冦之貨臨以容保教思司冦之祀歸妹以永終知敝死司冦之司􅆰中孚以議獄緩司冦之司徒履以非禮不履司冦之司冦兌以麗澤講習司冦之賓損以懲忿窒慾司冦之師暌以同而異七賓政艮序為司徒艮亦賓之食蹇以反身修徳賓之貨謙以稱物平施賓之祀小過以過恭過哀過儉賓之司􅆰漸以居賢徳善俗賓之司徒遯以嚴逺小人賓之司冦咸以虚受人賓之賓艮以思不出位獄賓之師旅以明慎不留八師政離序為司冦離亦師之食既濟以思患豫防師之貨明夷以用晦莅衆師之祀豐以折獄致刑物行有恒師之司空家人以言有師之司徒同人以類族辨物師之司冦革以治厯明時師之賓賁以明庶政無敢折獄師之師離以繼明照四方右八政分序凡二篇四其别各四千九十六各六十臣攷八政與周易周官同用而異體所以然者以其同出于圖書以式序五行相協民居一也民居之于五行猶醯醬之于飲食日用不離先王之于八政亦猶是也八政分屬皆從後天然以乾坤坎離定位分從則亦皆先天也有是八政以求五行然後五紀有所麗四克有所用休咎貞悔有所徴天地之為蓍龜帝王之為蓍龜與蓍龜所自為天地帝王者一也以是八政參于七卜而人神始協因而察于五事騐于庶徴稽于五紀正以三徳而上天陰隲之道條貫備矣此一未有敷詞蓋以是為綱自相經緯其文義浩重不可單舉要本于皇極以務民敬事則是八政者亦合為九疇而虚其一耳八政分屬與上卷明義不同彼槩五行此𨽻八卦非有矛盾也洪範明義卷下之上欽定四庫全書洪範明義卷下之中明黃道周撰五紀章第六四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數王省惟嵗卿士惟月師尹惟日章上有曰字衍嵗月日時無易百穀用成又用明俊民用章家用平康日月嵗時既易百穀用不成又用昬不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨此節疑在師尹惟日之下臣攷前章所敶五行五事八政皆從河圖而出雖略舉體用以性情事物立天人之總猶未明言其疇象分微之數即云以九命數以五命理亦大槩綱領得其欵項耳必使天人交動各有條貫觀日知嵗觀辰知月觀一世得百世則五紀者天地之版籍也堯典首舉閏朞春秋始正日月攷其細微莫過疇象疇象以九起之以六積之為五十三萬一千四百四十一為一百二十年之厯外贏五千四百八十一又六乗七百二十九之數毎嵗縮九則一百二十嵗當縮一千八十合贏縮之數外距天行每百二十嵗共餘六千五百六十一以四乗之凡四百八十嵗而餘六嵗之厯又贏五十四辰歸于斗分故以四百八十六為限以四百八十五為實者是疇之所以命嵗也以四百八十五為嵗五千八百二十為月又一百七十九為閏是疇之所以命月也以五千九百九十九為月則以十七萬七千一百四十六為日以三乗之為一百二十嵗之疇五十三萬一千四百四十一以十二乗之為二百一十二萬五千七百六十四辰也凡天地之數成于九極于六參于三要之以四則歸一矣故六九之積為一百二十一嵗之星參其六積為四百八十六嵗之日是律度權衡之所繇總也然皆不煩摩揣但以九起六積而得之一再屈指而具百二十一嵗之厯此範疇之至微要也古今算厯者皆不論辰但以日開分以分開秒于四分厯中減溜上下自謂精矣而施之非久輒不復騐即如三統大衍皆原本河圖約略爻象其精者不過于揲蓍九六冒其成數耳今以疇起厯以厯分辰以辰分星以星約日以日㑹月以月成嵗語嵗則有四百八十五嵗語月則有五千九百九十九月語日則有十七萬七千一百四十六日語辰則有二百一十二萬五千七百六十四辰語厯數則是五千八百二十嵗之厯去其差數舉其實數凡十二元範實五千七百六十因而重之二十四周萬有一千五百二十之星也要其始終皆出圖書故復具圖如左五紀略例凡洛書一九三七二八四六之文詨者雖習而數多不盡以五行五事論之亦曰一水二火三木四金五土一貌二言三視四聴五思天生地成以六成水以七成火以八成木以九成金以十歸五猶此四十五之文耳必以五紀論之則九疇相經各八十一此一紀也九經八十一為七百二十九此二紀也九經七百二十九為六千五百六十一此三紀也九經六千五百六十一為五萬九千四十九此四紀也九經五萬九千四十九為五十三萬一千四百四十一此五紀也以是五紀分嵗月日辰而統于厯數故五屈指而具百二十二嵗四分一之厯以四合之為四百八十五嵗以範計之則二十四周得萬有一千五百二十部長百二十嵗是五紀之所􅣟作也五紀所厯不過九疇九疇三乗各八十一生成之數各領其部一部主象各有重數如一一一二二二之類每部重數二十五參數五十六合為八十一得其重數則知其主部凡九部七百二十九以七百二十九自相乗即百二十一嵗強之厯因分部為圖如左北方一部一一一次一一二至一一九凡九象皆為乾兑之卦重象者九為水行盛始第二疇一二一一二二至一二九凡九象二重皆為離震之卦第三疇一三一一三二至一三九凡九象二重亦皆乾兊之卦第四疇一四一一四二至一四九亦九象二重為離震之卦第五疇一五一一五二至一五九凡九象二重亦皆乾兊之卦自是而下第六疇一六一至一六九凡九象二重亦離震之卦第七疇一七一至一七九凡九象二重亦乾兊之卦第八疇一八一至一八九九象二重亦離震之卦第九疇一九一至一九九凡九象二重亦皆乾兊也故北方首部九疇八十一象皆為乾兊離震之卦西南二部二一一次二一二至二一九凡九象二重皆為㢲坎之卦次疇二二一二二二至二二九重象者九皆為艮坤之卦故西南九疇八十一象皆為㢲坎艮坤之卦正東三部三一一次三一二至三一九凡九象二重皆為乾兑之卦次疇離震三疇三一三至三三三至三九三重象者九亦乾兑也故東方九疇八十一象皆為乾兑離震之卦東南四部四一一次四一二至四一九凡九象二重皆為㢲坎之卦暨第四疇四四一至四四四至四四九重象者九皆為艮坤故東南九疇八十一象皆為㢲坎艮坤之卦中央五部五一一次五一二至五一九凡九象二重皆為乾兑之卦次疇五二一至五二九皆為離震第五疇五五一至五五五至五五九重象者九皆為乾兑故中央九疇亦乾兑離震也五分戊巳或交於前或交於後一變而一不變則乾兑通於㢲坎離震變為艮坤故中央九疇八十一象得通八卦遍乘九部得五萬九千四十九卦凡疇每部各五萬九千四十九卦西北六部六一一次六一二至六一九凡九象二重皆為㢲坎卦第六疇六六一至六六六至六六九重象者九皆為艮坤故西北九疇八十一象皆為㢲坎艮坤之卦正西七部七一一次七一二至七一九凡九象二重皆乾兑卦次疇離震第七疇七七一至七七七至七七九重象者九皆乾兑也故正西九疇八十一象為乾兑離震之卦也東北八部八一一次八一二至八一九凡九象二重皆㢲坎卦第八疇八八一至八八八至八八九重象者九皆艮坤也故東北九疇八十一象皆為㢲坎艮坤之卦正南九部九一一次九一二至九一九凡九象二重九皆乾兑卦乾兑與離震間行第九疇九一九九二九至九九九重卦者九又皆乾兑也故正南九疇八十一象皆為乾兑離震之卦凡疇九部每部八十一象得七百二十九象為命厯之本每部各以八十一乗七百二十九得五萬九千四十九為十三年半又餘一百二十一辰五分以九乗之為五十三萬一千四百四十一得一百二十一年半餘一千九十三之辰五分以四收之為四百八十五年之厯内少九辰所以内少九辰者凡春秋命厯以疇範為本疇範命九春秋命六六其七百二十九為四千三百七十四比一嵗之厯常欠九辰積一百二十二年而絀一千九十八辰以四積之而絀四千三百九十二辰為四百八十七年絀四千三百八十三辰之實春秋所用二百四十三年郤退半載以就獲麟之㑹故合之為四百八十五載而得兩疇範之實也千古疇範之學託于仲尼觀于繫卦春秋得其藴矣自春秋而上厯數莫攷但以春秋證之文獻有徴聊附春秋厯數及圖書所推五行厯數于後焉厯數統紀上元甲子四百八十五年五十五辰二百一十二萬五千七百二元己巳九百七十年百一十辰四百二十五萬一千五三元甲戌一千四百五十五年五辰六百三十七萬七千二百六十四元己卯一千九百四十年八百五十一萬三千二十辰五元甲申二千四百二十五年五辰一千六十二萬八千七百七十六元己丑二千九百一十年百三十辰一千二百七十五萬四千五七元甲午三千三百九十五年五辰一千四百八十八萬二百八十八元己亥三千八百八十年十辰一千七百八萬六千五百四九元甲辰四千二百六十五年九十五辰一千九百一十二萬一千七百十元己酉四千八百五十年百五十辰二千一百三十五萬七千五十一元甲寅五千三百三十五年辰二千三百三十八萬三千三百五十二元己未五千八百二十年辰二千五百五十一萬九千六十右自太古上元羲農之前至魯隠公元年己未入十一元自隠公元年以前凡五千三百三十五年至秦王政九年又得四百八十五年嵗在癸亥彗星出長竟天明年甲子秦王政十年又起中元此端門之次符也又四百八十五年魏嘉平元年加司馬懿九錫之嵗嵗在己巳為中元之二㑹又四百八十五年開元二十二年秦州大震冬十二月戊子朔日食嵗在甲戌為中元之三㑹又四百八十五年宋寧宗嘉定十二年為元太祖真十四年嵗在己卯其年金人破武關分犯諸州為中元之三㑹以後一百四十五年而聖人始出凡自春秋而後終于元季二千八十九年除秦政以前四百八十五年為端門之木㑹以後金木火水相次為治復歸于土與周比隆雖損益間殊而疇象不變苟求其故千嵗可知也河圖厯數略自東周至元末八年二千一百三十土稼穡厯體數五百五十餘二百七十五在前際合損一百一十今存之以河圖領雒書為前贏厯周平王元年辛未至恵王十六年庚申凡一百一十年中更桓莊釐恵五王為稼穡初際周恵王十七年辛酉至靈王二十年庚戌中更恵襄頃匡定簡六王為稼穡二際周靈王二十一年辛亥至定王二十八年庚子中更靈景敬元定五王為稼穡三際周考王元年辛丑至顯王三十八年庚寅中更考威安烈顯五王為稼穡四際周顯王三十九年辛卯至秦始皇六年庚辰凡一百一十年中更周顯慎赧秦昭文莊襄二姓七王始命皇帝為稼穡五際凡稼穡之數以十命十下得一十以十命九下得二十以十命八下得三十以十命七下得四十以十命六下得五十往反疇列得五百五十為稼穡之成數又其前段以五命十下得一五至以六命五下得二十五往返疇列得二百七十五凡稼穡生成八百二十五參而兩之為周室命厯前後兩際稼穡前際是通水火嫓于夏殷稼穡後際是通金木嫓于漢晉凡五行之序西金東木北水南火經于中土二百七十五又復兩之五百五十而西金東木北水南火互相起也凡河圖體數三千二十五以五百五十為成二百七十五為生參兩生成八百二十五自中極而下合得八百二十五其五十之中九六七八兩兩相合亦得八百二十五故以五百五十為本而參其八百二十五則得三千二十五是河圖之體數也厯數皆用雒書而河圖立體天地所命始故周厯前段二百七十五不除五十後段五百五十不除一百為周厯八百二十五之實施于五行末祭皆去十存九只得六百七十五以三乗之為二千二十五與五徳循環入于厯始復加百五十配于卦象中分天地焉其五行參兩去十之法繫于下章金從革厯體數四百九十五合損九十存四百有五以下皆依雒書除十起例三際各百三十五秦始皇帝七年辛巳至漢昭帝始元元年乙未凡一百三十五年中更秦皇二世高恵文景武二姓七王為從革初際漢昭帝始元二年丙申至光武建武二十六年庚戌几一百三十五年中更昭宣元成哀平莽光武兩姓八主為從革中際漢世祖建武二十七年辛亥至靈帝中平二年乙丑凡一百三十五年中更明章和殤安順冲質桓靈十主為從革末際自周厯稼穡本于河圖合十存體至始而下五行相次皆準雒書以九為用焉凡從革之數以九命十下得一九以九命九下得二九以九命八下得三九以九命七下得四九以九命六下得五九往反疇列得四百九十五為從革之體數以雒書之用去十為體合去九十只餘四百有五參而兩之中于成帝鴻嘉四年甲辰孝景闕災廢許皇后之嵗也明年王莽始為新都侯故從革之厯起于秦并六國卒于三國分漢中於王氏革命皆革也其味作辛以干戈武力仗義取天下木曲直厯體數四百四十合損八十存三百六十三際各一百二十漢靈帝中平三年丙寅至晉恵帝永興二年乙丑凡一百二十年中更獻帝昭烈後主魏吳晉三姓為曲直初際晉恵帝光熈元年丙寅至宋文帝元嘉二年乙丑凡一百二十年中更懐愍元明成康穆哀益簡武安廢晉十三主及宋祖少帝二姓十五主為曲直中際宋文帝元嘉三年丙寅至梁武帝大同十一年乙丑凡一百二十年中更宋武文孝武明廢及齊太武昭案明昬和梁武三姓廿二主為曲直末際凡曲直之數以八命十下得一八以八命九下得二八以八命八下得三八以八命七下得四八以八命六下得五八往反疇列得四百四十為曲直之體數以雒書之用去十為體合去八十只餘三百六十參而兩之中于海西公之太和元年前年穆帝崩是年慕容恪陷秦洛陽其先五十四年石勒陷洛陽後五十四年劉裕弑零陵王曲直之初漢靈以天子躬為市販曲直之終梁武以黄屋捨于僧奴皆棄其準繩引于苞蘖作酸之味以蠅營狗苟隕其身火炎上厯體數三百八十五合損七十存三百一十五三際各一百有五梁武帝大同十二年丙寅至唐高宗永徽元年庚戌凡一百五年中更梁武簡文元晉安陳高蒨伯宗頊叔寶隋文煬唐髙相太宗四姓十四主為炎上初際唐高宗永徽二年辛亥至唐𤣥宗天寶十四載乙未凡一百五年中更高宗中宗武后睿宗四主為炎上中際唐肅宗至徳元載丙申至唐懿宗咸通元年庚辰凡一百五年中更肅代徳順憲穆敬文武宣十主為炎上末際凡炎上之數以七命十下得一七以七命九下得二七以七命八下得三七以七命七下得四七以七命六下得五七往反疇列得三百八十五以雒書之用去十為體合去七十只餘三百一十五參而兩之中于睿宗景龍之元年上五十二年皆武氏亂之唐室因以改命下五十二年皆安禄山亂之𤣥宗以奔蜀炎上之前七十二年唐周間雜炎上之後七十二年藩鎮怙終炎上者留餘曲直者多枝此其大較也水潤下厯體數三百三十合損六十存二百七十三際各九十唐懿宗咸通二年辛巳至漢少主乾祐三年庚戌凡九十年中更唐懿僖昭廢帝梁晃友貞及唐晉漢五姓十二主為潤下初際周主威廣順元年辛亥至宋仁宗康定元年庚辰凡九十年中更周二主宋太祖太宗真仁兩姓六主為潤下中際宋仁宗慶厯元年辛巳至宋高宗建炎四年凡九十年中更仁英神哲徽欽六主為潤下末際凡潤下之數以六命十下得一六以六命九下得二六以六命八下得三六以六命七下得四六以六命六下得五六往反疇列得三百三十為潤下之體數以雒書之用去十為體合去六十只餘二百七十參而兩之中宋太宗至道之元年兩分之際前有九十九年之代謝僅開三十六載之昇平後有九十九載之昇平遂開三十六年之禍敗傾流既倒不可復支蓋亦潤下之數然也自建炎而後但號江南雖正朔倚存而厯數不與土稼穡厯體數二百七十五合損五十存二百二十五三際各七十五年宋高宗紹興元年辛亥至寧宗開禧元年乙丑七十五年中更金天㑹皇統天徳貞元正隆大定明昌承安泰和凡九改元為稼穡初際宋寧宗開禧二年丙寅至元至元十七年庚辰七十五年中更金永濟大安崇寧貞祐至元及元庫台貴由孟格呼必列四主為稼穡中際元世祖至元十八年辛巳至順帝至正十五年乙未七十五年中更世祖成宗武宗仁宗英宗泰定帝明宗文宗寧宗九主為稼穡末際是亦稼穡也從河圖則存五十為二百七十五從雒書則去五十為二百二十五去五十則天中之厯止于龍飛乙未之初存五十則龍飛之元通于燕京定鼎之際聖人之于天地交取之也然此為厯數下際既用二百二十五則當以四百五十為正每際一百五十年自洪武乙未至𢎞治乙丑為一際又自𢎞治丙寅至崇禎丙申為一際周得河圖以王參霸後兩霸而前一王明得洛書以治正亂前一亂而後兩治參兩五十天之所命以為厯數之綱維五行之終始非可意為損益也以上河圖領雒書先用河圖五百五十起東周止於秦皇以下各用雒書本數得五行週嵗一千五百七十五若以雒書領河圖則千五百五十中去一百一十為四百四十起春秋止于赧王三十二以下各用河圖本數得四行本數一千六百五十總自春秋至明始二千九十數得相通也攷其成法凡五行相涵金水八百二十五去百五十為六百七十五火木八百二十五去百五十亦為六百七十五去者為用不去者為體全水火木合體一千六百五十加四百四十為二千九十金水火木合用一千三百五十加七百七十五為二千一百二十五所加七百七十五者兩土之合去其五十故河圖雒書體用之數相為終始也兩用相差餘三十五為聖人受命終始之符凡五行出入各有變動九六七八互移其居不能如卦象範疇與天度俱整故厯數所存在于疇象而疇象參兩與五行相稽必求其故則河圖命始者以金水木火發于西方左行為序雒書命始者以金木水火發于南方右行為序始于河圖者終于雒書始于雒書者終于河圖體用十五前後相權以成五紀不可易也今以雒書之領河圖始于春秋終于明始者再著為序俾後得參攷焉雒書厯數略自春秋元至元末二千九十年土稼穡厯用數四百五十又二百二十五在前際合加一百五十今去之以雒書領河圖為前縮厯周平王四十九年己未至周簡王十三年戊子凡一百五十年中更平桓莊釐恵襄頃匡定簡十王為稼穡初際周簡王十四年己丑至周威烈王三年戊午凡一百五十年中更襄頃匡定簡靈景敬元定考十一王為稼穡中際周威烈王四年己未至周赧王四十二年戊子凡一百五十年中更威安烈顯慎赧六王為稼穡末際凡稼穡用數去十存五以五命九下得一五以五命八下得二五以五命七下得三五以五命六下得四五凡得五十者四又以五命五為二百二十五合為四百五十四百五十在前則二百二十五在後前後表裏相為終始周前三百二十四進一百二十六則在太王之前退九十九則在穆王十七八上下所不加減前段者謂春秋後際盡于赧王四十二年當加四十五以生金四十五與五十五損益十載得相通也故自赧王四十三己丑至章武三年昭烈崩于永安之歳為四百九十五益稼穡四十五而得從革之末候是謂先用後體雒書之領河圖金水木火因以相次焉金從革厯用數四百有五合益九十為四百九十五三際各一百六十五以下依河圖加十起例周赧王四十三年己丑至漢武帝元封三年癸酉一百六十五年中更秦昭文襄始皇漢高恵文景武兩姓九主為從革前際漢武帝元封四年甲戌至漢明帝永平元年戊午一百六十五年中更武帝昭宣元成哀平莽光武兩姓九主為從革中際漢明帝永平二年己未至漢昭烈章武三年癸卯一百六十五年中更明章和殤安順沖質桓靈獻昭烈一姓十二主為從革末際體數起例具在前篇中分三際二百四十七為漢成帝河平三年乙未犍為山崩江水逆流冬十月乙夘朔食之歳也參而伍之各九十九分為五際一漢文帝六年丁卯一為孝昭元鳯六年丙午一為世祖元年乙酉一為安帝延光三年甲子以至昭烈崩于永安之嵗故漢道之貴從革漢運之繫昭烈厯數在天而呉主繆應黄龍之祥魏室偽奸夘金之位可謂汨陳五行失其倫序者矣水潤下厯用數二百七十合益六十為三百三十每際各一百一十漢後主建興二年甲辰至晉成帝咸和八年癸巳一百一十年中更後主晉武帝恵懐愍元明成兩姓八主為潤下初際晉成帝咸和九年甲午至宋文帝元嘉二十年癸未一百一十年中更晉成康穆哀奕簡武安恭及宋高文兩姓十一主為潤下中際宋元嘉二十一年甲申至梁主繹二年癸酉一百一十年中更宋文帝孝武子業明廢齊高武昭業明昬和梁武帝簡文三姓十三主為潤下後際體數起例具在前篇中分三際一百六十五為晉孝武太元十四年己丑吕光姚萇破苻秦之歳也是時四方殽亂中原鼎沸水行潤下北而趨隂南渡四朝頽瀾莫反參而伍之各六十六一晉武帝太康十年己酉明年武帝崩一晉穆帝永和十一年乙卯是年秦苻生始立一晉恭帝元熈二年辛酉晉室已終宋魏秦夏俱起一齊永明四年丁卯魏作明堂辟雍于是道在元魏至臺城之後侯景立豫章僧辨立湘東明年宇文泰立齊王廓而下流愈頽河洛俱竭矣故潤下之厯歸于朔方齊周隋唐縁此萌蘖也火炎上厯用數三百一十五合益七十為三百八十五毎際各一百二十八强梁元帝繹二年甲戌至唐高宗開耀元年辛巳一百二十八年中更陳武帝文帝伯宗宣帝後主隋文煬唐高祖太宗高宗三姓九主為炎上初際唐高宗永淳元年壬午至唐憲宗元和四年己丑一百二十八年中更高中睿𤣥肅代徳順八主為炎上中際唐憲宗元和五年庚寅至晉天福三年戊戌一百二十九年中更唐宣宗懿僖昭廢梁唐晉四姓十主為炎上末際中分三際一百九十二半為唐𤣥宗天寶之四載立貴妃楊氏之嵗也參而伍之各七十七嵗一為貞觀四年庚寅俘頡利可汗之嵗一為景龍元年丁未太子重俊誅武三思之嵗一為徳宗興元元年甲子朱泚破長安上奔梁州之嵗一為懿宗咸通二年辛巳杜悰平章之嵗以至于石晉戊戌而契丹稱遼遼之為禍與宗終始五代之錯于火徳猶焚燎之為首尾上有梁陳隋下有梁唐晉雖外域不競而冦攘奸回女謁宦侍可備炯武者至炎上之厯皆備矣以河圖左旋之厯推之宜為曲直而五行互起不循生序故復以炎上繼于潤下猶九六七八之相亞也木曲直厯用數三百六十合益八十為四百四十毎際一百四十六強晉主敬塘天福四年己亥至宋神宗元豐七年甲子一百四十六年中更晉漢周四姓七主及宋太祖太宗真仁英五主為曲直初際宋神宗元豐八年乙丑至宋理宗紹定五年壬辰一百四十八年中更哲宗徽欽高孝光寧理七主為曲直中際宋理宗紹定六年癸巳至明洪武十年戊午一百四寧十六年中更宋理度及元世祖成武仁英泰定明文順帝二姓十二主為曲直未際中分三際二百二十為紹興二十三年癸酉金貞元元年遷都于燕之二嵗也參而伍之各得八十八年一仁宗天聖四年丙寅京師及諸軍大水十月癸酉朔日食一徽宗政和四年甲午女直始敗遼于混同江一寧宗嘉泰二年壬戌始弛偽學之禁一元至正二十七年庚寅武平江陰諸路地震大水載及戊午而宇宙廓清日月宣昭萬物之所終始也是厯以金水火木相亞為序漢晉唐宋各居四厯之中必以水火木金依數求之則自明戊午至咸淳戊辰為水末際又至紹興戊寅為水中際又至慶厯八年戊子為水初際參而兩之以嘉泰二年壬戌為中際上下百年未有分據又進求火運三百八十五年自慶厯丁亥至末唐天祐十七年庚辰為火末際又至徳宗貞元八年壬申為火中際又至高宗麟徳元年甲子為火初際參而兩之以咸通五年甲申為中際治亂終始亦未勻停又進求木運自唐龍朔三年癸亥至梁天監十五年丙申為木末際又至海西公太和四年巳巳為木中際又自漢後主建興元年癸卯為木初際參而兩之以魏太平真君作壇受符之嵗在元嘉壬午為中際徒具成數而已即以金水木火求之第三運移火從木自梁主繹至宋太宗淳化癸巳四百四十年中分二百二十為天寶十三載得其中際猶不得前後故知河圖順行雒書逆轉之為膠柱水一火二木三金四之為腰皷也要以數千百年之内五行屈伸貫穿五十周游八虚何者不屆聊舉成數以引其端云耳以上所論嵗月日星辰厯數皆有定序千古不易間有易者若五行厯數循環起止前後易序無關災咎箕子所稱嵗月日時不易日月嵗時既易者必如古人所稱蛇乗龍星紀淫于元枵之說然嵗星遞移陰陽縣絶春秋所怪今皆為常必如嵗鎮熒惑金水錯行黄道皆上厯太微下連箕斗于奎婁角亢之間與日月出入不能無相凌犯要不至大易其序皆為常行如古者不知日月食朔之說即十月之詩驚詫異常今皆豫刻分杪不失躔度則不宜以異常目之然以月掩日以日衝月則真可謂易矣月行至低去日皆十三度外則去嵗填熒惑金水亦可十三四度有道經三垣及諸次舍吞掩諸星從下視之如有反易實不相干五星相差高下去天各可數度毎度視地三百六十餘里如舩㠶影相去三百里外決無鬭虧之虞但因人所見以為反常則隨地修省耳秦漢以下設立官次分奠列國皆非職方保章之舊必如曰某星犯某國犯某官主有某災則鬬爭搏擊之禍皆因而起決非聖人之所推求又如水貌火言木眎金聽古人不用辰熒嵗白之占亦以為兵喪水旱雜著其兆耳今依春秋再舉日食彗孛歳饑之年以為五紀反易餘不暇詳焉日月失紀魯隠公三年二月巳巳朔日食桓公三年七月壬辰朔日食桓公十七年十月朔食明年夏喪至自齊莊公十八年五月壬子朔食莊公廿五年七月辛未朔食食莊公廿六年十二月癸亥朔僖公五年九月戊申朔食文公元年三月癸亥朔食文公十五年六月辛丑朔食時楚人始霸宣公八年七月甲子朔食既宣公十年四月丙辰十七年五月癸卯朔食朔食成公十六年六月丙寅十七年十一月丁巳襄公十四年二月乙未十五年八月丁巳朔食食襄公二十年十月丙辰二十一年九月庚戌朔襄公二十三年二月癸酉朔食既襄公二十四年七月甲子朔食襄公二十七年十一月乙亥朔食明年靈王崩昭公七年四月甲辰朔食昭公十五年五月丁巳十七年六月甲戌朔食昭公二十一年七月壬午朔食明年王室亂昭公二十四年五月乙未朔食明年孫于齊侯昭公三十一年十二月辛亥朔食明年薨乾定公五年辛亥朔食十二年十一月丙寅朔食定公十五年八月庚辰朔食是年夏薨高寢哀公十四年五月庚申朔食是為春秋之終惟王省凡日食有常行而詩刺不臧亦藉以示儆也嵗蓋以憫農敬義統嵗之成猶之受終舉要云耳卿士惟月師尹惟日此皆不關朔食之事然厯數推行則必以朔食為始春秋三十六食不書事應而弑君之變密與相符亦猶之以日當辟也昭公三十一年十二月辛亥朔食史墨以為吳將入郢則是以楚當日也凡日月之食因地所見以為淺深是時魯事楚而不事周故以辰尾為楚以楚當日猶之本國所見亦當其本國之君也此特舉垂象而言不關省協之義如五紀本意則以九疇相起二十六萬二千九百八十為六十嵗週甲之辰四週加二謂之厯數以嵗分之每嵗各得四千三百七十四謂之嵗數以月分之毎月各得三百六十四半謂之月數以日分之每日各得十二謂之日數以星分之每星一辰謂之辰數此嵗月日辰皆大者舉綱小者舉目重者舉全輕者舉碎猶六爻一卦十有八變統得四千九十六其初六變可以得嵗其中六變可以得月其末五變可以得日其上末一變可以得辰總六十四卦則可以得閏得交得食而成厯數由是以辨省位則初六變為王中六變為卿士末五變為師尹七一變為庶民因世所居視其貞悔以風雨寒温為候前世之有道術者皆用之使八政之官皆依此起事以得其陰隲所在恰當不易不然則五紀八政未有所繫猶帝王之自為疇象非疇象之自為天地也春秋紀嵗必紀日紀日必紀其于支一一不爽則當時所為嵗月日日月嵗之說必有確然可據者古學久湮俗禁反泥故復以春秋而下日月交食之數次于後焉以證漢高帝三年十月甲戌晦食是吕氏殺趙王高帝九年六月乙未晦食既惠帝七年十二月辛未朔食是猶之前食應高后二年六月丙戌七年正月己丑食應文帝二年十一月癸卯三年十月丁酉食文帝七年正月辛未朔食是皆不應景帝三年壬午食是皆應諸侯王太子榮景帝七年十二月庚寅朔食是廢中元元年十二月甲寅三年九月戊戌食中元六年八月辛亥朔食後元元年八月巳巳朔食又明年應陽陵食武帝建元二年二月丙戌三年九月丙子元光元年二月丙辰七月癸未日食乙巳食元朔二年二月巳巳元狩元年五月元鼎五年四月丁丑太始四年十月甲寅食征和