body:
  text: 洪範明義卷下之上明黄道周撰訪箕章第一惟十有三祀王訪於箕子王乃言曰嗚呼箕子惟天隂隲下民相協厥居我不知其彞倫攸叙隂隲下民本之於天相協厥居參之於地彞倫攸叙稽之於人是三極之總也易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽剛柔一仁義也仁義在天以隲隂陽在地以協剛柔武王所問箕子所答皆是物也箕子乃言曰我聞在昔鯀陻洪水汩陳其五行帝乃震怒不畀洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸叙武王為九疇而問箕子為九疇而答大禹之道將明於周體國經野設官分職皆從此出故三代之法禹立其極矣鯀陻洪水削髙就下山川之叙失其行列蓋天地之用著於五行五行之質著於山川垂象成形人民攸託雖聖人不能盡知亦莫之敢亂也乃震乃錫首發帝天寶愛之道為聖人敬愛張本於隂陽剛柔仁義之説有獨得其微者矣下章稽疑庶徵嚮威之用皆明帝天震錫之意以五行五事相終始云叙疇章第二初一曰五行隂陽者天地之氣五行者天地之質氣質具而性命行乎其中氣非質不具理與氣共質故但曰五行不曰二氣二氣者易之治五行者範之治易與範共為治也一為十始復起於十天地所為用即天地所為體故統領其文不復言用明疇體之有九用初一之備十體也次二曰敬用五事次三曰晨用八政晨原本農次四曰協用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六殛殛原作極是九疇之目蓋兼圖史而用之也河圖有文自一至十故曰一六居上二七居下三八居左四九居右五十居中是依五行之位以為彞倫範之正也洛書有文去十為九故曰戴九履一左三右七二八通肩六四通足五居其中是準十五之數以為疇列範之奇也雒書以九而致用故五事敬用是生晨協建又明念嚮威之用河圖以十而命體故五行為體是通事政紀徳疑徵福殛之體國書分說雖有異同其於不汨五行不斁倫序居一以御萬執兩而用中發揮皇極原本帝天則其義一也世儒不知圖書為易範之原始但以辨方正位粗舉其端又不知五行為相協之大事但以生尅順逆略綜其概凡自漢儒而下錯舉隂陽災異之説皆一併詆為矯誣妖妄是以震錫莫聞君心不戒禹箕之學無得而稱焉今以洛書分疇具圖於後雒書原圖是即所謂戴九履一左三右七二八通肩六四通足五居其中者也神龜所負文有疇列聖人則之以觀象設教五行出於北極一者辰極之位故五行宅焉二者鬼神所宗鬼神立於西南為敬用之始故五事位焉有五事則有庶徴故敬者所以致念也政事明於東作為晨用之始故八政位焉有八政則有稽疑故晨者所以致明也聖賢立於西北為乂用之始故三徳位焉有三徳則有五紀故乂者所以致協也福殛明於南方與五行共治嚮之者福悖之者威二用交致以歸於皇極故皇極五行威福帝天之中路也九疇八貫四週各十有五曲折勾股或離或合出入皇極少極於六多極於二十四圭黍三重少極於三多極於二十七升降消長朔望盈虚備於是矣箕子以是命疇周公以是命卦九疇之卦七百二十九因而乘之五十三萬一千四百四十一皆有敬念晨明協乂建嚮威之用猶易之有出齊見役説戰勞成也易用八而疇用九以易之太極為疇之建用則亦皆九矣以疇之九數為易之六爻則亦皆八矣易主日月疇主星辰二五叅合天道乃明周濓溪曰隂陽一五行也五行一太極也語雖渾圇而意亦不甚失臣觀古人天人精藴備在是疇箕子爾時必有圖象繋綴明白易圖書不稱為箕子所作者蓋羲禹以前有之箕子必述舊法先為圖象後以敷言分屬其下也其法以君心為主謂之皇極上下四旁備列天人以鑒觀省察互成其用一天而九人為性命之本三人而七天為事業之原四天而六人以考成政治二人而八天以終始道徳左右天人一貫互用以易稽之則乾坤震三者易之綱領皆為人事艮巽兊三者易之妙應皆為天道坎離戊已則帝天之柄與王者相參鬼神臣工所從取命也知其説者之於天下其如示諸斯乎五行章第三一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘質非性也質具而性見焉體非用也體具而用見焉因其質以為人事因其用以為道化故有潤下炎上曲直從革稼穡之事而王者及物之功皆盡冇作鹹作苦作酸作辛作甘之化而聖人體物之情皆見矣是章五行之序皆在河圖因列河圖於後是即所謂一六居後二七居前三八居左四九居右五十居中者也五行生成各以其方圜而視之其象六乘彼此參變為數百萬故河圖以五十五為象以百萬為數水之潤下火之炎上木之曲直金之從革縱横稼穡與土相得不可易也以五十有五各自相乘為三千二十五故以百萬為用三千二十五為體經緯六十四卦而成象成形相協之故舉可知也已臣按雒書自為九疇之序河圖自為五行之序九疇五行雖共一範而各自為序非有河圖主生雒書主剋之説也惟五行災異之論本以上天示儆人主省愆稽古證今不為臆説而儒者動云春秋不書事應深詆伏董歐劉之學不知春秋事應散見諸篇立經主簡則文義分行為傳尚通則織組必至今以世無通貫之經而謂經無證應之義可乎故復以河圖再繫五事而畧舉證應錯見于後云五事章第四二五事一曰貎二曰言三曰視四曰聽五曰思貎曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作又明作哲聰作謀睿作聖範為五行攸序而作則五事之從五行倫次秩然不可易也㐲歐夏劉以木金水火為序近於汨陳五行者矣然其所錄春秋事應亦多不符五沴之例蓋天道人事互相表裏天作於先而人應之謂之明兆人作於先而天應之謂之譴告因天以儆人因人以祗天晝參之蓍龜夜卜之夢寐仰觀俯察皆以敬事為本作聖為終雖古今異説不必盡符併存其意可也五事配合五行圖在天曰五行在人曰五事五行居于正北而五事處於西南五行與福殛為衝其道甚大五事與庶徵相㑹其幾甚微故以五行抵五事其應不能悉合以五事抵庶徴其兆亦不能甚著也要以地道用六天道尚九三微成著天人呼應近者三年之内逺者九載之外禆竈策陳五年而封申𦙍推燕一紀乃復而今定以春秋指其事應雖蘭菊不能必其皆華露霜亦有爽其節候矣必總攝一君該貫時事理數參同可得而言焉水行汨叙魯桓公元年秋大水鍾巫之餘沴也桓公十三年夏大水彭生之先兆也荘公七年秋大水防榖之沴再見弑其君荘公十一年秋宋大水明年宋萬荘公廿四年秋大水姜氏入宗婦覿用幣荘公廿五年秋大水慶父之先兆也宣公十年秋大水為貴戚主兵兵成公五年秋大水亦為貴戚主襄公二十三年榖洛水鬭毁王宫王室主災襄公二十四年秋大水亦為國弱兵繁秦武王三年渭水赤商鞅主災中皆水漢惠帝三年四年八年河南漢文帝十二十五年東郡藍田大水匈奴犯邊武帝建元二年春平原水溢始用衛青元光三年春河徙入渤海冬殺竇嬰大宛元鼎二年夏大水殺丞相青翟通使元帝初元元年二年五年諸郡水應在石顯成帝建始三年河平三年三輔水應在諸舅漢光武六七八年郡國水不應一年灾不應建武二十四年睢水逆流三十明帝永平三年七年京師郡國水不應和帝永元元年郡國秋大水應在竇氏永元十年十二年夏大水應在鄧氏殤帝延平元年大水是應亦在鄧氏安帝永初元年冬河南湧水兵起應在鄧氏永初三四五年京師郡國大水鄧閻合沴永初六年河東池水赤鄧氏主災楊震延光三年大水王聖主灾殺太尉順帝永建四年五郡大水十九侯之餘沴也質帝本初元年北海溢梁冀主災於玉堂桓帝建和二年秋京師大水陳留長平盜起建和三年永興元年二年水溢應在梁氏永夀元年雒水溢入城門中官始行三年䘮延熹八年九年夏濟北平原河清立竇氏靈帝建寧四年春河清夏水湧侯覽主災熹平二三四年水溢是有宣陵孝子中平五年六郡國水湧張讓主災彪獻帝建安二年秋漢水溢殺太尉建安十八年秋水溢應在曹氏襲殺關羽建安二十四年秋漢水溢孫權以上四十災有徴應者三十七建武有廢郭后及東海王事永平冇馬氏之立及隂太后䘮沴發中宫借其前平以毖後艱天心仁愛於是可見也魏黄初四年夏伊雒溢先主崩於永安景初元年冀兖徐豫四州水應在司馬氏魏吳赤烏八年十三年三十年水溢應在與晉武帝太始四年秋青徐兖豫大水應賈氏咸寧二年魏郡水溢荆州大水上大魰色咸寧三年夏秋冬俱水賈充主災伎於宫中泰康二年泰山江夏湧水大選吴泰康五年任城水赤六七年郡國大水應北兵惠帝元康五年六年荆揚大水應在賈氏元康八年金墉城井溢趙王倫主災主災永寧元年宫中井溢秋大水齊王冏太安元年兖豫徐冀四州水應在張方也元帝太與三年四年大水石頭之先兆明帝太寧元年諸郡大水王敦主災成帝咸和元年夏大水應在庾氏咸和二年京師大水蘇峻主災為國弱兵繁穆帝永和四五六年夏大水亦永和七年秋濤水入石頭亦為權貴主兵氏升平四年姑臧澤有火五年大水應在桓太和六年夏水浸太廟桓温主災重於兵簡文咸安元年冬濤水入石頭䘮孝武帝太元三五六年大水應在苻兵兵繁太元八年十年十三年大水亦為國弱太元十五年夏濤入石頭𤣥恭之先兆也安帝隆安三年夏刑州大水應殷仲堪隆安五年夏大水應在孫恩桓𤣥主災自成元興三年濤入石頭漂萬舟義熈二三年濤入石頭應在劉氏廟應劉氏義熈十年十一年夏秋湧水浸太以上自漢至晉終六百二十一年災之正應五十八惟哀平十二年懐愍十年水災不告非哀平懐愍貎皆作肅亦非衰漢亂晉水獨潤下也其丁寧於先譴告不倦在元成武惠之間禍謫既多及於哀平懐愍安受其敗雖譴告之無益矣留覽之下可以深省也宋文帝元嘉五年七年都下大水無應元嘉十二十七八九年都下大水無應殃元嘉二十五年水澹謂之地鏡魏宋兆齊廢帝永元元年秋都下大水應在南康梁天監二年夏南郡水應在陳劉天監六七十二年南康大水准堰主災大通五年御道没水災在浮圖後周大象元年咸陽水為血是為國殃主災隋文帝開皇十八年河南八州水楊素仁壽二年河南北大水廢蜀王秀應在子廣煬帝大業三年水漂河南三十郡應在長城唐太宗貞觀三年山東六郡水應在大安宫貞觀十一年榖水入宫毁宫門應在武氏貞觀十六年至廿二年諸州皆水應武氏命貞觀十四年至調露二年河水屢清應革髙宗永徽元年郡國大水災應王后氏主災永徽五年夏水入𤣥武門溺衞士武顯慶元年東海溢廢子忠立宏忌顯慶四年連州湧水殺趙公無總章二年東海溢冀州大水咎在李勣咸亨元二四年水溢應在武承嗣上元三年東海溢青齊大水天后殺太子宏永隆元二年河南北大水廢太子賢永淳元二年洛水溢河溢應在乾陵革唐正如意元年夏秋洛水大溢諸王災是長壽二年棣河溢神功元年括州水州大水聖厯二年洛水壊天津橋三四年諸神龍元年夏大水秋洛水溢武廢復立韋氏神龍二年地鏡見洛水壞天津橋是殺五玉景龍三年宻州水四年井溢韋氏主灾𤣥宗開元三四五年洛瀍溢應在契丹開元八年榖洛溢入上陽宫興道坊䧟開元十年伊水溢南郡水應在楊思朂開元十四五年河南北大水澗榖溢宫開元十八年洛水溢壞橋梁是兆東開元二十二年關