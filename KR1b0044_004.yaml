body:
  text: 洪範明義卷末明黃道周撰洪範再定今文惟十有三祀王訪于箕子王乃言曰嗚呼箕子惟天隂隲下民相協厥居我不知其彛倫攸敘箕子乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘初一曰五行次二曰敬用五事次三曰晨用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六殛一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數曰王省惟嵗卿士惟月師尹惟日嵗月日時無易百榖用成乂用明俊民用章家用平康日月嵗時既易百穀用不成乂用昏不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨上三疇皆未有敷言至五紀而有者五行之用存于五紀詳五紀以協五行之用也五皇極皇建其有極皇極敷詞皆在末假此處提綱只用一語足以丄包四疇下該五用也六三德一曰正直二曰剛克三曰柔克平康正直強弗友剛克燮友柔克沈潛剛克髙明柔克此亦提綱不用敷言九疇惟皇極有敷言五紀庶徵嚮威雖冇敷言猶之提綱也七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍一立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶八庶徴曰雨曰㿩曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶曰休徴曰肅時雨若曰乂時㿩若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恆雨若曰僭恆㿩若曰豫恆燠若曰急恆寒若曰蒙恆風若九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六殛一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱維辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒此條舊在三德之下定本移為終篇其實篇意未盡當與嚮威相聨而終於好惡之義蓋威福之源出於好惡五行之用著於喜怒帝天所為命聖人所為性合而建之以為皇極故五建之文未用敷言至是始合闡其義細繹其文久當自見斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無遍王道平平無反無側王道正直會其有極歸其有極曰皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王臣按自斂時五福至天下王二百四十六字文氣聯屬原彚一處不須動移惟王省一假移歸五紀惟辟一段移歸威福則通篇條序燦然更無乖錯矣想古人著範别有成圖逐假分繫既合成篇則假數差池若依再定之文則首尾完好意義具足雖分繫圖象而皇極敷言自為一處五紀嚮威各有綱領更不相混臣研思十載繆存是説著於終篇亦惟因先儒之緒以俟聖明鑒定不敢自謂臆據焉九功圖附後河圖之有五十所謂六府也卜者謂之土五者謂之穀二典之源亦出於圖書九疇與二典相為表裏水火金木皆附於土五土之英皆發於穀故範言土不言穀也雒書之有三疇所謂三事也三三為九二九十八六爻三變皆以二五為正德初四三上為利用厚生此據其三疇中五者而言之其五在初四三上則八疇自為正德此據六爻之五數或在初四或在三上者言之其六爻或無五數則八疇自為三事凡九疇分於六爻各存五則得八十一各去五則得六十四六十四者自為三事凡九疇合言土穀則得九九共八十一為七百二十九乘數五十三萬一千四百四十一分言土穀則得十十其百為千乘數百萬合除四十六萬八千五百五十九凡九疇乘數內除得五之數為二十六萬二千一百四十四即六十年之縮厯不除得五之數為五十三萬一千四百四十一即一百二十年之贏厯也贏厯滿分自二曜合行而外尚餘五千五百為水火木金土循環之區故五十有五者帝天所錫福會極之數也凡卦九疇兩九十八因而三之每三得六得乾之疇一萬五千六百二十五得坤之疇四千九十六乾坤之交九千八百六十物無三疇俱得乾坤者故中數之限交於二萬九千六百為八十一歲之日為隂陽九疇之中也二九之間初四為利用二五為正德三上為厚生六府之行各其所值惠之而得福逆之而得殛福殛之分三事之等也然則威福繫於惟辟則帝天無權與曰惟辟之威福即帝天之威福也惟皇建極則天無多辟詩曰蕩蕩上帝下民之辟疾威上帝其命多辟又曰天生蒸民其命匪諶靡不有初鮮克有終故正德者利厚之原好德者考終之極也右九功圖義凡唐虞作事皆本於圖書震怒之帝與錫禹之天其所授受上下一也堯典言厯象日月星辰洪範言歲月日星辰厯數蓋自羲黃以來本天相傳禮樂刑政皆從此出舜典言歲二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡守至于南嶽八月西巡守至于西嶽十有一月朔巡守至于北嶽歸格于藝祖五載一巡守羣后四朝皆用河圖也漢初議禮樂者皆用河圖雖剿舊説無甚深義而其淵源去古未逺即如流宥五刑曰鞭作官刑朴作教刑金作贖刑眚災肆赦怙終賊刑其義亦取於河圖土當肆赦東南當於鞭朴西北底於贖終也繇是而推吉禮二七凶禮一六軍禮四九賓禮三八或以賓吉遞為東南軍凶遞為西北嘉禮四周關詢於中是亦河圖也至如九官之制燦然雒書伯禹作司空治於正北棄作后稷治於中土契作司徒治於正東臯陶作士治於正西垂作共工治於西北益作虞治於東北伯夷作秩宗治於正南蘷典樂治於東南龍納言治於西南東南定位而四方底從其外以四嶽十二牧分治侯國四三十二與時日協以象日月星辰厯數合於九官二十五人以代天工故曰合二十五人之智智於神禹夫有所本之也故詩書訛舛非稽古則莫之正也因是而推五典五惇五服五章五刑五用皆出於河圖而縱撗十五皆通於雒書九族九功九德九歌九載九共皆出於雒書而六九虛中皆貫于河圖大槩然矣右九官圖義然則五品五教五禮五惇皆列以五而又曰三禮何也曰三五者聖人之常致也五刑三就五宅三居三五十五十五而參兩之義備矣禮本於三中於五行於九至於九而天神地祗人鬼之精意皆著矣三者五之著中者也三九二十七三其二十七為八十一三八二十四三其二十四為七十二兩者易道之綱紀也故曰三五而盈三五而缺雒書之西南十八而東北十二東南十六而西北十四故西北長則東南消西南消則東北長月行九道夬姤剝復見之四端故三五相應而天神地祗人鬼之精意皆著矣然則禮不言九而樂言九何也曰禮本隂而率地樂本陽而率天禮成於五而極於六樂起於六而極於九三代之樂異制而參於三成起於六律終於九變其義一也然則樂之有九變何也曰環宫也環宫之不十二變何也曰三時之用各有所不盡焉猶百二十二之止於八十一也體四用三體三用兩樂律所繇始也然則樂律之始八十有一而其細數至於十七萬七千一百四十七何也曰是猶三分之一也體三用兩九數之極為五十三萬一千四百四十一九變律不得七百二十九只得七百一十七以七百一十七相乘只得五十一萬四千八十九何也曰律皆左旋天恆左轉左旋皆遲右旋比疾範與天右旋春秋與易詩與律皆左旋以次見遲故範四百八十六年而進五年律每六十年而退一年天行其中酌為斗差故極遲之差八十一年極速之差五十九年而天差一度六乘五十九為天期之常周是二典所造端於厯象也然則律行五十一萬四千九十乃百二十嵗而􅰞一嵗今以六十約之何也曰律六正而九六間用正合間故以律包吕也然則樂貴全分黃鐘寸全分以統天林鐘六寸全分以統地太簇八寸全分以統人及祀天神乃用夾鐘為宫祀地祈用林鐘為宫祀人鬼用黃鐘為宫者何也曰三統之用各有所取之天取於日地取月人取於隂陽之交四聲相間取於星辰虞夏殷周各不同用也必以為夾鐘生於房心天社出於井鬼宗廟著於虛危則三代上下相越二宫宫律正應與之俱變矣然則天神言六變而地祇言八變人鬼言九變者何也曰自質而文自簡繁簫韶九成禮樂之極致也右九變圖義凡洪範之本出於唐虞唐虞之用極於禮樂故道至禮樂而九用之精義皆盡矣自洪範言九疇皇極而後惟大學潔矩用極之説獨闢其宗故復為潔矩用極圖如左凡星辰皆無好惡因日月之行以為好惡日行去極遠則星寒去極近則星暑星寒為冬星暑為夏壁室未嘗好雨寒退而多雨翼軫未嘗好風暑退而多風庶民亦無好惡因君相之行以為好惡堯舜興而民好善幽厲興而民好暴然則大學稱民之所好好之民之所惡惡之何也是言民性也民性好善而惡不善好善之性猶水之潤下火之炎上木之曲直金之從革土之稼穡不與堯舜幽厲為增損其與堯舜幽厲為增損者教也非性也聖人因性立教使父子冇恩君臣冇義夫婦冇别長幼冇序朋友有信一木其所誠然而為之召好去惡猶五行之各不相易至於慶賞刑威之用不過進退張弛歸於中和而已洪範言無有作好無有作惡大學言好人所惡惡人所好災必逮身皆指帝天錫命秉彛好德而言好德而冇好惡猶遠極自寒近極自暑暑中而夏寒中而冬雖冇好惡猶之無有好惡也故洪範之旨曰攸好德建用皇極大學之旨曰止至善無所不用其極皆以極言命以善言性性命立而道教從之矩立於方圖之中極建於圓圖之內參兩天地以得其平其所以平之亦曰中和而已洪範之言慎好潔矩之言去惡皆根極至命達於天地之情故不知洪範建極之義者則觀大學潔矩之法舜禹仲尼所以開創傳受範圍曲成者燦然暏矣上卷皆言止善立極性命之理下卷頗舉象數以綜天人之務恐觀者眩於象數故復原本二典以至大學用中用極之意為平格隂隲圖終焉右平格隂隲圖義終卷九功九官九變平格凡七圖附於再定今文之末洪範明義卷末
