body:
  text: 洪範明義卷上之上明黃道周撰訪箕章第一惟十有三祀王訪于箕子殷曰祀周曰年逸周書大匡篇亦曰十有三祀則是周未改年也武王承文王之統致辟於殷釋箕子於囚因而訪道易言箕子之明夷明禹湯之道在於箕子也道在箕子則武王必就學於箕子古稱武王師於箕子大戴禮曰先王之道不北靣王行西折東靣而立師尚父西靣道書之言則訪道之禮或當然也孟子曰湯之於伊尹學焉而後臣之湯於伊尹武王於箕子蓋皆師也舊書序稱武王勝殷殺受立武庚以箕子歸作洪範云王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彛倫攸叙隂靜騭定也相助協和也彛倫常理也言上天靜默品騭下民作君作師以相助和協其天下必有常理叙布其間循之者治紊之者亂是以天人感應百世不爽是聖學之首務也蓋天以二氣五行化生萬物形質不齊因其生克以為倫叙而人所受於天者曰命曰性性命之原本於太極至善不離至一不二隂陽五行以是分化迪吉逆凶是生治亂衆人皆知為善之得吉為惡之得凶而不知其條理倫次毫髮不爽默操其柄品騭于上謂之帝天精明其道叙布於天下謂之聖人聖人之於天道猶日用之於飲食也武王生備聖德老紹家學于天人感應隂騭相協之道蓋深知之而猶云不知將以發其義類垂憲百世盛德之至也箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸叙陻塞汨亂也畀與斁敗也九疇即洪範之目其文縱橫如田畝之有疇列也箕子承武王之問乃答言在昔堯時鯀恃其力不率水性陻塞洪水亂五行之列上帝乃震怒不畀以洪範九疇民既不得安居彛倫亦以斁敗蓋五行生人水為之始水既亂行則土不稼穯火不炎上金木因之不遂其性蓋天地之有五行猶人之有五質五質循叙而後性命之理可求也鯀恃其力以拂天地之性其始以為物皆可以力爭其終至於敗壞不可收拾鯀則殛死禹乃嗣興禹順水性以修幹蠱之業不樂其有竒功而樂其有常理上帝知禹不拂人性以汨天道乃錫禹洪範九疇以騭下民奠厥居而五常之理無復紊亂是禹順水性即所以順天地之性順天地之性即以立萬民之命其道不敝其理一也周靈王二十二年榖洛鬭壞王宫王子晉論共工伯鯀之意亦若此程頤曰聖人能使天下順治非能為物作則也惟止之各于其所而已物各止其所而天之彛倫乃叙故曰相協厥居蘇軾曰騭升也通也天人有相通之道若顯然命之則家為巫史矣惟逹者默然心通謂之隂騭君子不默通天道則無以助民而合其居王肅曰隂騭者上天之事相協者人君之事言上天深定下民與以五常之性王者當助天和協其居以遂天性也先臣劉三吾嘗引王肅之說以詆蔡傳其實隂騭相協皆本於天書曰協和萬邦詩曰克定厥家雖人事亦天道也自三代而下皆以五常為性本人而得其體故有仁義禮智信之名三代而上皆以五常為命本天而得其用故有雨暘燠寒風之實稽其淵源皆根本太極分布二五命之曰性率之曰道修之曰教歸于至善好德而已故洪範一書言天人感應一以好德為主孟子言人性好善猶水就下周敦頤言五行本於太極意亦如此其一九二八三七四六縱橫十五皆貫串皇極以叙九疇自人視之則為至道自天視之則為常理自聖人視之則以為皆上天相協之事隂騭之心而已叙疇章第二初一曰五行此叙疇之綱也洛書九疇始於天一天一為坎坎以從坤萬物所生天子負扆而立嚮明出治昏旦中星皆見於南方故離乾者聖人所為治坤坎者聖人所為宅也萬物之生各有從始五行既具隂騭始著其理以為五德五性其質以為五體五色其氣以為五聲五味聖人本于太初以立命始以得五行精一之致以辨德性氣質之類以進其不及裁其太過是為相協之始事後世人主以八柄在握威福自用未有原本五行靣稽天若者故初一曰五行所以隂騭下民先立其命也一與九合昏旦之星南北反易太史治之先儒曰五行不言用無適而非用也宣宗章皇帝曰首以五行本諸天也次二曰敬用五事二者西南之位也坤與巽合萬物之所從入人事動於朝而息于夕五行晦于晝而辨于夜故天所為五行人所謂五事萬物成形禍福以分則敬用者立極之始也帝王敬身即以敬天事身即以事天天道而後次以帝德則敬立而體用乃備矣二與八應坤艮震巽互相為治此天人之要路也天子有道師保傅治之宣宗章皇帝曰五事所以治心修身為皇極之要敬之一言又五事之要人君為治之心法也臣按武王克商既訪道於箕子及踐阼之三日召士大夫問曰惡有藏之約行之周可萬世為子孫恆者乎諸大夫謀于師尚父乃召師尚父問曰黃帝顓頊之道猶有存者亦可得見與師尚父曰在丹書王欲聞之則齊矣齊三日王端冕出師尚父亦端冕奉書入負屏而立王下堂師尚父曰先王之道不北靣王西行折而南東靣而立師尚父西靣道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不强則枉弗敬則不正枉者滅廢敬者萬世王聞之惕若恐懼於席四端於機鑑盤楹帶屨觴豆户牖杖劍弓矛皆為銘警焉此二事者若相發明而洪範之言大備矣太祖世宗皆有觀心亭銘敬一之針義出於此皆以保治萬世隂騭相協之要道也次三曰農用八政農疑作晨師古曰農厚也鄭𤣥曰農讀為醲重用之也諸以農為八政之首者非是三者正東方之位也震與兌合人官與鬼神互相為治故有天命則有人官有五事則有八政五事以正性命八政以正禮樂人託於坤而出於震自黃鍾而林鍾而太蔟八律之序也自姑洗而夷則而黃鍾五位之等也故卯辰之間先王所以重其事也天子有道冡宰治之次四曰協用五紀四者巽東南之位也巽與乾合帝天神人之交也二氣五行互相為治故有八政則有五紀八政以仁天下五紀以仁萬世協者天人之合也自震而巽順行以通于極繇是則萬物皆協矣天子有道卿士師尹治之章皇帝曰繇前四疇皇極之所以立繇後四疇皇極之所以行也次五曰建用皇極皇天也極君也極即北極洪範以天道治天下俯而垂象故八政在左立而監本故五行在後以人道南靣仰而則之則東西南北互為用也聖人本天以為體本心以為用建於不動以為衆動之樞易有太極是生兩儀蓋此謂也天體中分一百八十三度北極出地三十六度則南極入地亦三十六度人不見南極而見北極皇皇在上至精至微至中至一凡萬物之所謂命謂性謂心皆出于此也自其分布流行合理與氣而言之則為五行自其運持推移動靜不分而言之則謂皇極大學之所謂至善中庸之所謂獨也後世儒者不知其說以為王者建事皆用大中無太過不及之弊因時調停為羣情取𠂻卒使邪正混淆賢奸并用而維皇之極始不可建今觀日月運行春秋之中去極各九十一度北進二十四度日永而暑暑則萬物敷榮民得免於沍隂湫滯之患南進二十四度日短而寒寒則萬物歸根民得免於癘疫耗泄之患天地之意皆以生人也而所裁制其間損益進退不為寒暑燥濕所動者率於近極六十七度之端凜凜乎見之學者不觀于極則不知天地所以立心不知天地所以立心則不知生民之所以立命推其原本則正要執樞淵然不動無喜怒哀樂之私有戒慎恐懼之實是建用之微㫖也次六曰乂用三德六西北乾位也乾秉三德以應五紀有三德而後五紀成其功乂治也剛柔正直與隂陽共為治也君子成德于身以協五紀雖歲月有百世之治焉乂協亦敬也非敬則無以治身無以治身則無以治卿尹士庶人故乂協之通于皇極乾坤之順治也自乂協而外贏乏異數曲折殊位矣以乂道承之則乂協敬念亦互為用也其在先天託於艮兌嶽牧治之次七曰明用稽疑七正西兌方也兌為明澤以稽八政天下之叢疑者莫八政若也明以稽之明農互用明農猶言明晨也古之尊神集于西首神人參稽而哲后與謀夫無有自專其智者矣故兌者悅也明而後不疑不疑而後悅悅而後天子有以正其德庶民有以厚其生天地有以利其用八政之行行于流水則明用之效也其在先天託于坎離太卜太祝治之次八曰念用庶徵八東北艮位也艮成萬物以徵五事人事盡于下符驗充於上念省也省亦敬也人之情魄天之知氣互相為治省懼多則民寡過和順積則物無禍其協於歲月稽於卜筮驗于災祥非過也亦猶是天性之自為命令也其在先天託於震巽太史太師治之次九曰嚮用五福威用六極嚮明也威畏也極宜作殛九為乾離以納坤坎故八方分用而九得二焉其五福之用嚮於皇極六殛之用威於五行故南北正治嚮明操柄則取諸此矣皇極不言福五行不言威而九以乾離併而取之易曰乾元用九天下治夫是二者皆天用之非君用之也天之所嚮則福之天之所威則殛之一本之五行若云其命則然自取之耳詩曰自求多福書曰自作孽夫是則亦天子之所自治也然則五行不言一用九位兼言二用何也五行藏用者也九位顯仁也藏用則歸于一歸于一則無所不用顯仁則合于兩合于兩則無所不用者皆化矣故人君之八柄皆非人君之所自用也五行之數根伏於地而動著于南方為人君者敬以居之虛以取之嚮之威之與天下共聽與天下共覩如此而已矣五行之根伏于地而動著于南方何也人著地而生嚮明而立見其用則藏其體見其體則藏其用故見北極不見北極而下者猶艮之止其背也故體者極也用者日也不見其體則其用著見其用則其體隱矣日在于子五行之所從始一歲之月一日之辰經緯所厯于是藏用猶人主之有後官故後天謂之坎先天謂之坤萬物所宅故謂之初日在于午五行之所從著一歲之月一日之辰經緯所厯于是顯仁猶人主之有前朝故後天謂之離先天謂之乾萬物所治故曰威曰嚮日在于卯五行之所覿從一歲之月一日之辰經緯所歷于是利見猶朝寧之有東序八政出焉夙夜匪懈以厚其事故謂之晨日在于酉五行之所離舍一歲之月一日之辰經緯所歷于是靜定猶朝寧之有西序疑事稽焉動靜吉凶不違其物故謂之明四者天地日月之正位也冬至前後日出辰而入申五事五紀互相為治天人于是辨其端夏至前後日出寅而入戌三德庶徵互相為治天人于是盡其緒五事五紀三德庶徵四者皆五也寅戌馭一辰申馭九皆十有五也然而不貫于極故五事庶徵五紀三德以坤艮巽乾自為治也凡疇之為象三疇相乘而謂之兆太十有原兆玉兆瓦兆相乘之兆七百二十有九其縱橫十五者得八而已天子所執以治八方非聖人則莫之能用也因天之象俯以示人則九乾一坤南首北尾三震七兌左肱右臂人仰而睹之以皇極見天之心因地之象仰以視天則一坎九離北首南尾三震七兌左肱右臂天俯而矚之以皇極見人之心故語天道則北極出地三干六度而下五行所宅初一之用皆不可見為嚮威之根自出地而上六十七度夏至以南福殛所宣皆聖人體天與天下之所共見語地道則南極入地三十六度而下五行所宅初一之用皆不可見為嚮威之根自出地而上三十一度冬至以北福殛所宣皆聖人體天與天下之所共見天下之所共見非所不見者用之不神故敬一之要修之于深宫仁義禮智之端藏之於幽獨左有賓師右有蓍龜事紀在前德徵在後是以福殛不大衮鉞不試而天下治平詩曰帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則其天所錫範于文王者乎章皇帝曰天以二氣五行生育萬物而理行乎其中人君以其理修已治人而氣參乎其上故九疇于天道人事皆互言之至哉皇言得其選矣臣按漢唐諸儒以皇極為大中不知精一危微之㫖本於辰極即所謂以敬作所者也皇極之義不明所以曽布王淮亂之於始韓伌胄溷之於終唐之建中大中宋之建中致和率是禍也今既原本天地取表日月以至善為建極之凖以慎獨為建極之要則紛紜之論庶有折𠂻邪說詖行可以不作西漢諸儒惟董仲舒逹于性命然其時舜典未著不聞精一之㫖其論中和者曰天有兩和以成二中歲立其中用之不窮是故北方之中隂合陽而生始動于下南方之中陽合隂而養始養于上動于下者不得東方之和不能生中春是也養于上者不至西方之和不能成中秋是也生至東方之中而所生大成養至西方之中而所養大成一歲四和業而必止于中中之所為而必就于和故和者天地之正也隂陽之萃也陽之首始于北方之中而止于南方之中隂始于南方之中而止于北方之中隂陽之道不同至于盛而皆止于中中者天地之極日月之所至而却也仲舒此論亦與建極之義相參然天惟一中歲有四和日月之運行以寒暑為冬夏以風雨為春秋春秋二中不過晝夜所為平等非天地建中立極之義如云中者天地之極日月所至而却則又逺于居所不動之㫖矣大約漢唐而下此義久湮求其精要莫明于大學莫備于中庸大學之始篇言明新歸于止至善中庸言明誠歸于無聲無臭至矣至者極也維皇所建不假慶威不煩賞怒為性命之淵源中和之根柢自洙泗外無得而聞焉周敦頤作太極圖言曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉隂變陽合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生各一其性二五之精妙合而凝五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉朱子深信其書以為出于洪範然洪範所稱皇極確有建用之文濓溪所稱無極已墜𤣥虛之藏五性感動已淆氣質之間主靜立人亦乖敬一之㫖也古人觀象至精不以一為太極而以一為五行不以五為五福而以五為皇極明以一皆當五五即為一人包五氣五質而生心不在五氣五質之數此極既建則萬象環生先儒曰皇極不言數不可以數明也詩曰商邑翼翼四方之極又曰穆穆文王於緝熙敬止明于二詩則知建用之義矣五行章第三一五行一曰水二曰火三曰木四曰金五曰土五行分化序其生者所謂初也隂陽之精見于水火剛柔之義著于金木土載其下以通地天有是五者以别男女以正性命隂陽相交剛柔相推變化錯綜或當或爽而治亂出焉帝王之生皆木五德以長天下而其說奧渺不可復稽但以數而言則一六二七三八四九五十為主成之次以象而言則一北二南三左四右五中為分布之等故人生而有體魄氣候榮衛經絡推于四海日月出入無不同者干支所配日用所資皆是物也聖人觀形以知理觀性以知命觀其生勝配合以知隂騭相協之意故生者以協父子勝者以協君臣並者以協兄弟因君臣以協夫婦因兄弟以協朋友智由此出禮由此作仁由此奮義由此制信由此立腑臟官骸由此以理道化政刑由此以設于以制器利用則大備矣聖人雖不明著其事而福殛之所由生燦然可見要以原本太極修道明教納民于至善之域則非聖人不足以語此也孔頴逹曰萬物成形自微漸著五行前後亦以微著為序水最微為一火漸著為二木形實為三金體固為四土質博為五五行之形布于地其氣運行于天故其宿次分野禍福驗于人事劉向曰精發于地而華形于天易傳曰在天成象在地成形非聖賢格物窮理何以知此朱子曰五行質具于地而氣行于天以質而語其生之序則曰水火木金土以氣而語其行之序則曰木火土金水又曰河圖以生為序故自北而東而而而中而西洛書以尅為序故一六在西北二七在西南四九在東南三八在東北此但語其概耳其實五行之理無所不周以類族辨物正位居方則其序備在圖書若舉五德之運帝王所以升降萬物所以興衰斷依洪範為序如人初生一月而生津液二月而生氣息三月而生體質四月而生骨骼五月而成膚肉人道之成先有男女而後有夫婦有夫婦而後有父子有父子而後有君臣兄弟朋友親戚上下貴賤在天以為常理在人以為彛倫大易叙卦亦依此意諸云生尅者按圖摸索不足稱也臣按古聖少言天道其言天道者惟洪範堯典二篇為千古厯數之所從出仲尼子産未之談也凡仲尼言殷厯夏厯皆謂之曰禮子産言隂陽五行皆以禮明之故洪範者夏殷之禮書也子太叔曰吉也聞之先大夫曰禮天之經地之義民之行也則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性故為六牲五畜三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦內外以經二物為父子兄弟婚媾姻婭以象天明為政事庸力行務以從四時為刑獄撻罰以類其震曜殺戮為溫慈和惠以效其生殖長育是故好惡不忒哀樂不失乃能協于天地之性是以長久故人能自曲直以赴于禮者謂之成人此章語意粗與範合至如戴氏五德之說鄒生五勝之運莫之能詳也閒嘗流覽厯數紬繹義類自夏殷而上文獻無徵由周而來二千七百餘歲以易象凖之天地之厯上下各二千一百八十七歲前盛者後衰前分者後合五行之令各以成數經其體數滿其體數而去其生數凡得五德之運皆一水二火三木四金土居兩端以承前後水德之運二百四十其行潤下以六經九自九而八而七而六而十又與五合其餘作鹹作鹹之數九十火德之運二百八十其行炎上以七經六自六而七而八而九而十去其五生其餘作苦作苦之數一百有五木德之運三百二十其行曲直以八經八自八而七而六而九而十去其五生其餘作酸作酸之數一百二十金德之運三百六十其行從革以九經九自九而六而七而八而十去其五生其餘作辛作辛之數一百三十有五三分損益以復于土其金德不敗不復于土土德之運兩復兩襲五百五十其行稼穡自五而九而六而八而七而十復以十經之并其五生其餘作甘作甘之數二百七十五以合于水前後二千四百七十五歲損益三百有五而五德再周德盛者一姓而再興德衰者一運而數姓前並則後離前渙則後萃杞宋有徵則顓􅰥而上猶可屈指也故知聖神之文必無虛設書意之間常未盡言影響傅㑹以求精微去之逺矣肅皇帝曰天以二氣運育萬物五行受令無一不然人君能體天心牧天民以五行為法聽政施令皆上合天意下合民心是即所以福乎民也水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡此言五行之質舉質而性見舉性而德亦見焉水居北方質潤而善下火居南方質炎而善上善下則物以生善上則物以熟木居東方善曲以直金居西方善從以革曲直則物得其用從革則物得其利土則無所不周也凡人之生水降而下以受其精火升而上以受其氣左手曲直為柔以便右于從革為剛以利腑臟受物縱橫吐納若稼穡也聖人觀于五行得其常質又推其德性以施于物故于潤下得其智于炎上得其禮于曲直得其仁于從革得其義于稼穡得其信人主智不足以沁物則為水不潤下禮不足以興文則為火不炎上仁不能旁逹蠧生苞蘖則為木不曲直義不能裁决乍作乍止則為金不從革詩書不御人民不殖政令變更教諌不入則為土不爰稼穡也五行傳曰田獵不反宿飲食不饗出入無節奪民農時作為姦謀以奪民財是為木不曲直信道不篤惑耀虛僞讒夫倡邪勝正棄法律縱情欲是為火不炎上治宫室飭臺榭內淫嬖犯親戚侮父兄是為稼穡不成貪欲恣睢務立威勝輕百姓好攻戰是為金不從革簡宗廟弛禱祠廢祭祀逆天時是為水不潤下潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘此言五行之氣舉氣而理見舉理而功亦見焉古人之味道也微有舍聲色而得其用者矣視𤣥而聽羽視赤而聽徵視青而聽角視白而聽商視黃而聽宫人所能也味智而得其鹹味禮而得其苦味仁而得其酸味義而得其辛味信而得其甘與夫味甘而得信味辛而得義味酸而得仁味苦而得禮味鹹而得智此非人所能也天人之間以氣相取能者用以作福不能者用以作殛不待察其聲色而氣先取之矣人主不納忠言見利速功則水不作鹹不實儀物簡衆便獨則火不作苦重細過易入人之罪則木不作酸好姑息讒間得入則金不作辛仁賢在野莫與盡力則土不作甘子産言天有六氣降生五味子産之智則足以知此也古之聖人觀物之質而知其性觀物之氣而知其命觀其所作而知造物者之性之命體之察之服習既久則彛倫畢見仁義禮智皆根于心而後發為事業猶五臟之逹于靣目雲雨之發于山川色聲臭味之發于物則也若是而後可通于五行之用者矣五事章第四二五事一曰貌二曰言三曰視四曰聽五曰思天道言行天之所自行人道言事人之所有事也天有灾祥惟水最大而火次之人有吉凶惟貌最著而言次之物有利害惟木與金人冇邪正惟視與聽火之為灾烈于水言之取凶迅于貌金之害人重于木聽之入邪深于視此四者行事之所以相配也以事從行取其用者以察灾祥辨吉凶審利害别邪正則亦無所不用矣敬者思之權量也五事皆敬則無所不休五事皆肆則無所不咎以敬為事因之以為德性因之以為學問而後天人之行事可得而言矣先儒曰貌澤水也言揚火也視散木也聽收金也思通土也夫是謂之質又曰人之生而形質具既生而聲音發久之而後能視久之而後能聽又久之而後能思五事之有先後猶五形之有微著夫是之為氣氣與質皆可與辨體未可與明用也體用之原出于動靜動靜之本出于隂陽隂陽之用合于剛柔水以陽用隂體動而用靜貌得其事故以貌為水天下之作態多姿者皆水也火以隂用陽體靜而用動言得其事故以言為火天下之著筆著舌者皆火也木以柔用陽以動而為靜金以剛用隂以靜而為動視以動為靜陽而近柔聽以靜為動隂而近剛故以視為木以聽為金天下之接而易合者皆木納而易斷者皆金也古之聖人逺觀近取或得之意或得之象醫者得之意卜者得之象卦以象為體範以意為用配屬不齊又何怪乎臣按五事配屬諸家互異素問以生為序則貌土言金視水聽木思火五行傳以尅為序則貌木言金視火聽水思土然以五事庶徵推之則洪範之序自有一水二火三木四金五土與二家者宜自分行也諸說參差俗情取似但謂貌以作肅似宜屬本視為內景自宜屬水耳漢唐諸儒皆謂震東方為木震為足以動容貌西方兊為口兊以出辭氣南方離為火火以離為目北方坎為水水以坎為耳其質不然者易有易之序範有範之序其一二三四的然不爽豈宜背馳且如醫家以木屬肝肝屬日萬物齊潔以魂相視以汗屬水汗發于廣顙逹于四肢又何疑于貌之非水視之非本乎黃幹曰五行之序所配與所屬不同配者對峙為體猶易之先天卦圖屬者流行為用猶易之後天卦圖洪範對峙言其所配二家流行言其所用是說近之然自古聖人立言有確然不易之處非苟然分繫而已凡人先氣而後質先精而後魄五氣之用藏于腑臟為五行之實人所以生五精之用逹于顔靣為五行之華人所以榮天人交應皆取其華實如主客然靣相覿也天道仰而成圖以南為首人道立而成象以北為首南北交濟精神在靣靣有鼻口耳目物冇臭味色聲人物之生始于鼻神鬼之通始于臭故鼻主貌而潤下口主言而炎上目主視而曲直耳主聽而從革心主思而稼穡內發于腑臟外逹于事物次第較然不可易也知其不可易者而後以稽干或易不易之故而後天人交應之義可微言也貌曰恭言曰從視曰明聽曰聰思曰睿人事者天道之精神也天人之精神皆聚于敬非敬則五事無其體非敬則五行無其用貌敬則恭言敬則從視敬則明聽敬則聰思敬則睿貌言視聽思五者皆人也人而天之恭從明聰睿則皆非人也貌恭不在于潤下言從不在於炎上視明不在于曲直聽聰不在于從革思睿不在于稼穡善變其氣質則氣質皆變矣縱橫稼穡以為睿思與化從革以為聰聽以道曲直以為明視炎上不焚以為從言潤下不流以為恭貌善存其德性則德性皆存矣古之聖人載籍簡少皆未有所學學水之善下以為恭貌學火之善揚以為從言學本之曲直不蔽其質以為明視學金之從革不主先入以為聰聽學土之稼穡耕之耨之以為睿思如此則可謂之知道矣恭作肅從作乂明作哲聰作謀睿作聖天德者人事之精魄也敬其體則其用具敬其用則其體備舉矣恭從明聰睿猶有其氣質焉肅又哲謀聖則無復有其氣質焉鼻口目耳之化于心思猶水火木金之化于太極也天下之人食于鹹苦酸辛不知其為水火木金也猶食于肅乂哲謀不知其誰之鼻口目耳也聖人自敬其身以及其身之天世亦因而天之天下之吉德美事則皆以為聖人之為之故其恭從明聰發于一身而肅又哲謀著于天下天下從之以為聖人是則思之為用與皇極同用毋不敬儼若思是之謂也朱子曰洪範五事以思為主四者可見思不可見而行乎四者之間然其操存之漸必自可見者為之曽子告孟敬子曰動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣故君子之學自外而斂之內自其可見以斂于不可見者由貌而言由言而視而聽而思彌近彌親以為操存之序凡若是者所以為仁也仁則誠誠則天天與人合故行事不二神化不測也傳曰五行之秀為人人之精神為聖書曰亶聰明作元后然其操存之序皆與下學同功孔子告顔淵曰非禮勿視非禮勿聽非禮勿言非禮勿動其說詩曰思無邪此五者又敬事之實也肅皇帝曰敬用五事者言人君能誠以修身而聰明於視聽恭于貌順于言又思微察邇是乃所以建極而為福民之要也八政章第五三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司冦七曰賓八曰師八政立而後五事備五事備而後五行之用得其所民生而有食有食而後有貨食貨具而後有以明報祀死養生而後有以安其居安居重遷而後可教可教而後可禁可禁而後可與禮樂可與征伐故八政以緩急為次八政之始于食猶五行之終于味也五行之用鹹苦辛酸皆可以食要之于草可以養性鹽鐵泉布皆可以貨要之稼穡可以養命故五祀皆可報也而重于社稷五土皆可居也而詳于曠虛五教皆可陳也而慎于徒衆五禁皆可敕也而嚴于冦攘五等皆可賔也而尚有德五戎皆可師也而要止亂周公生于夏殷之後彛倫廢斁故其典制詳于官師大禹生于唐虞之間慎徽尚存故其闡楊精于性命孟軻與庸主誦說故以田畝樹畜留八政之餘箕子與聖人敷陳故以政事福威寓五行之內是以九疇皆有演說而八政獨否將其大者存于典謨精者存于皇極太宰所職猶在官師未足以罄天德王道之㫖歟臣按八政盡在舜典故洪範不復敷詞如食哉惟時柔逺能邇惇德允元而難任人已盡八政之羲至于后稷播榖伯夷秩宗禹平水土契司親遜臬陶明允龍作納言通于賓益作朕虞通于貨總師之人通于徂征則彛倫咸在矣又如禹貢之致詳于食貨時巡之咸秩于禋望古今八政備在三篇是以作者不復敷詞也正義曰八政皆以及民非獨王家之事食貨祀賓師既皆指事為名司空司徒司冦又皆指官為號者三卿所典多方意非一義所盡也周禮食貨出于司徒統在太宰賓祀皆在宗伯協于司徒司馬總六師之職司冦與克詰之征獨司空無事從力于虛危之間夏人尊司空以尚司徒故特稱三卿也考洪範之意皆以五行為主人事天工皆為五行之相協舉三卿以治五行則食一為水貨二為火賓三為木師四為金祀五為土也舉三事以正五官則司空為水治北方司冦為火治南方賓政為木治東方師政為金治西方司徒為土治中央也臣按易之為道與範表裏範言天德以章王道體九而用八易言王道以章天德體八而用九易之體八者如乾以自彊坤以厚載坎以常習離以繼照震以修省艮以止思巽以中命兌以麗澤皆藏道而顯德未嘗及政也巽一及之而非其至也範之用八者如食一貨二祀三司空司徒司冦七賓八師皆藏德而顯道若未嘗及于性命者問以五行屬之而亦非其至也今觀二書互為體用易言其體範言其用綱領各八其别六十四以六十四乘之四于九十六如食以養生貨以阜民祀以報本司空掌土司徒掌教司冦掌禁賓以柔逺師以除暴每政之中各有八政八八相起而禮樂變化施于無窮唐虞成周官制相參猶為未備矣八政之中賓簡于祀祀簡于貨然是三者精微相依猶金木之于乾坤風雷之于水火不因微著以為次序必如易象所屬則乾兌兩金震巽兩木坤艮兩土司空兩水司徒兩土司冦兩火因而重之多寡饒乏各不相礙也因别為圖著于後篇肅皇帝曰農用八政者言人君以此庶政施于朝廷無一不舉而天下之人各厚其生亦所以福乎民也五紀章第六四五紀一曰歲二曰月三曰日四曰星辰五曰厯數五紀者五行之總也人生于五行而紀于五厯天德王道由此以協不協五紀則天德王道亦無以終始也歲冇隂陽五行分合天氣乘之各以佳惡五陽之年氣或先天是為太過五隂之年氣或後天是為不及平氣之年不害主客聖人皆先冇以處之使歲不為厲月有交㑹是生薄蝕因其躔次以測分野定其閏積以正氣候視其明魄以别旱潦故天道之親人者莫如月也日冇剛柔聖人察之外事用剛內事川柔先甲用辛後甲用丁庚之中令戊之差馬聖人亦採之以正刑德以度內外使知懼又因日出視其輝氣以察善敗故天道之可尊者莫如日也星冇離合五行凌犯災眚所生視其躔次以别分野或水或火或荒或兵皆先設之以前民患四者既備而後厯數可得而舉也凡聖人之為是四者皆以憂民意不主于厯數然而厯數備是矣古之秀民遵道就路自飭躬勵行而外無復文字技巧纍其心思惟是二氣五行猶飲食之有醯醬也二氣明而後二氣節宣鬼神不奸其令五行明而後災祥眚赦天地不違其和有是五者以協五事紀八政而後帝王之厯數修短次第燦然可數矣臣按五紀不復敷詞其文盡在堯典或云逸在下章也堯典乃命羲和欽若昊天厯象日月星辰敬授人時分命羲仲日中星鳥以殷仲春申命羲叔日永星火以正仲夏分命和仲宵中星虛以殷仲秋申命和叔日短星昴以正仲冬曰咨汝羲暨和朞三百六旬有六日以閏月定四時成歲則厯數之義大備然觀千古聖人欽若天憲覽時對物推閏考差占星正物不過就數年上下測驗取合因前揣後不失躔次而已至其終始損益象有定理理有定數千年億世猶之一日决非占風步景之所能知易稱伏羲神農黃帝堯舜始作易其初無有言辭不過以紀歲月日星厯數之事今推其義亦本于自然使人知有統體分殊之理而已凡易與律律與厯三者同質而異名律以九起易以八乘七八九六各自相因律歸于九易歸于八圓方相割以歸于厯八卦九律凡十有八變而嵗月日星帝王厯數一一可埋也凡論厯數之道須先明方圓之極方起于卦圓起于律三分徑圍得其餘分以為損益方五損一生內而圜贏圓四益一生外而方絀圜十去一生內而方饒方九益一生外而圜乏凡置方田四徑一百二十八以規規之而得天行之常度徑一之數不及三圍日差于天月差于日火差于木木差于土日月星辰相差之數皆從此起也古之聖人不貴難知之事不作無益之器如使歲月日時果無當于政事則璿璣玉衡可廢矣厯家測歲星左右之說已久廢不驗管子春為歲德夏為口德秋為月德冬為星德之說又于義未該考洪範之法以九乘九得八十一以九乘八十一得七百二十九以六乘七百二十九得四千三百七十四故以四千三百七十四為歲以七百二十九為月以八十一為日以九一為星辰以五十三萬一千四百四十為厯數凡一歲之日退九辰八十一嵗之日退兩月之辰二百四十三歲之日退半歲之月凡四百八十六歲而退一歲之辰四千三百七十四歲而退九歲之月于是而五紀之數大略可考也自上元以來至于春秋甲子己巳甲戌己卯千九百四十四歲在軒轅之初日躔營室又厯有八元甲申己丑甲午己亥甲辰己酉甲寅己未凡十冇一元五千三百四十六歲斗差之退八十一度故周在嬃女虞夏而上在于虛危春秋而降際于牛斗五紀之所從次則必在此矣古之聖人仰觀天道遐測邃初知厯數之所在有道以持之慎之于初保之手中鞏之于終若申伯仲山甫衛武公其人也不知五紀不知歲月日星厯數之所在與氣浮沈動或違時若趙孟萇𢎞單襄公其人也今以範通卦為五紀之法約有三等凡卦六十四為爻三百八十四各自相乘為卦四千九十六為爻二萬四千五百七十六通乘之數一百二十七萬二千八百六十四以爻協日則為四千三百六十九歲之日以爻協時則為四千三百六十九月之時以其歲月約其日時進退氣朔則為一歲十有二月之日十有九歲一章七閏之月也此一等但取每卦三乘之爻酌定六十七歲餘分之日以為歲月日辰厯數而閏餘朔交斗差之法定之易卦六十四乾坤坎離頤大過中孚小過八體反覆為七十二亦自相乘為卦五千一百八十四為爻三萬一千一百四通乘之數二百二十三萬九千四百八十八以爻協歲則為五百一十一歲之辰以爻協月則為六千一百三十二月之閏均其日餘四分之一減其餘分一之六一于以上追斗差下齊朔㑹則不出卦爻之內以日通歲以月通時而可坐得四千三百六十九歲之大都立成五百一十一歲之密步也此一等但取本卦三乘之爻定為七歲餘分之積又成七歲成歲之積無復餘分視其盈縮以定差閏以為歲月日辰厯數而交㑹大小差閏之法亦定合于疇法以并厯律刓方削圓交致其用協是三者而伶倫容成大意盡矣故五紀之道非可意為加損也亦非可隨時更革自為明治也知其損益以得差數明其消長以證常度古之聖人不出户牖知天道不越圖書見百世職此故也易大傳曰天確然示人易矣如必比㑹櫛蔀旁求巧合雖𨽻首猶為勞矣至于五緯運行各自為度體質有重輕則行離有遲速去日有逺近則伏見有順逆熒惑七十九年四十二周歲星八十三年七周鎮星五十九年二周皆在三萬一千一百四爻之內金水依日躔次易推諸星凌犯或難悉數要觀于圖書之相加微于一三著于三九極于五十三萬一千四百二十四而五行相沴交㑹之說大備間有次舍分野不齊皆可義取以古準今未為濶也聖人觀厯而知其紀知歲月日辰之所分屬與卿士師尹分合為治諸如建侯行師作樂殷薦敕法省方赦過宥罪治戎防患勞民勸相之類一一得其綱目順時條布使子孫率由雖千載無弊可耳或曰卦象出于文周疇範本于虞夏疇有數無文範有詞無卦安得以文周之卦爻合于虞夏之歲月其實畫卦有彖已在羲農之時尋象遺詞並可坐合文周之指但以五行配于五紀三變之內文義已多况以八政領其五行倍乘之餘厯數俱在世有精能之士以是紀歲紀月紀日紀星紀辰授之天子卿士師尹庶民則天人之故燦如指掌至于帝王五德盛衰之治斷自五行中分疇象二千有百九十一載左順右逆一負一勝惟有德者能持其後不至困窮其精義與是相起云肅皇帝曰協用五紀者五紀乃相天之五行人君能致此五紀順序若時合于天道亦所以福乎民也臣按先儒蘇軾洪邁張九成葉夢得金履祥皆稱庶徵章王省惟歲以下八十五字宜繫于此今未敢遽定别正後篇洪範明義卷上之上
